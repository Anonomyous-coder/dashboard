<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Workspace Dashboard</title>
    <style>
@import url('https://fonts.googleapis.com/css2?family=Chakra+Petch:wght@500;600;700&family=JetBrains+Mono:wght@600;700&family=Inter:wght@400;500;600;700&display=swap');

/* ============ Design tokens — Cyber SOC (lighter steel + dark slate) ============ */
:root {
  --bg: #0c1118;
  --surface: #18222e;        /* opaque, used for masks/inputs */
  --surface-2: #1f2c3a;
  --panel: #16202c;          /* lighter steel panels */
  --panel-2: #1b2733;
  --border: rgba(125,170,210,.16);
  --border-strong: rgba(125,170,210,.30);
  --text: #e9f1f9;
  --text-soft: #9fb2c6;
  --text-faint: #6b7e93;
  --primary: #2dd4ff;        /* cyber cyan */
  --primary-2: #2f7bff;      /* electric blue */
  --primary-soft: rgba(45,212,255,.14);
  --gold: #7dd3fc;           /* light cyan accent (HUD) */
  --gold-soft: rgba(125,211,252,.14);
  --success: #3ddc97;        /* secure */
  --success-soft: rgba(61,220,151,.14);
  --warn: #ffb020;           /* warning */
  --warn-soft: rgba(255,176,32,.15);
  --danger: #ff4d5e;         /* threat / critical */
  --danger-soft: rgba(255,77,94,.15);
  --info: #38bdf8;
  --info-soft: rgba(56,189,248,.14);
  --sidebar-bg: rgba(9,13,19,.82);
  --sidebar-text: #93a6bb;
  --shadow: 0 1px 0 rgba(255,255,255,.03) inset, 0 16px 44px -22px rgba(0,0,0,.85);
  --glow: 0 0 22px -6px rgba(45,212,255,.6);
  --radius: 14px;
  --radius-sm: 10px;
  --font: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
  --display: 'Chakra Petch', var(--font);
  --mono: 'JetBrains Mono', ui-monospace, 'SF Mono', Menlo, monospace;
}
[data-theme="light"] {
  --bg: #e7edf4;
  --surface: #ffffff;
  --surface-2: #eef3f9;
  --panel: #ffffff;
  --panel-2: #f4f8fc;
  --border: rgba(40,80,120,.14);
  --border-strong: rgba(40,80,120,.26);
  --text: #11202e;
  --text-soft: #43586b;
  --text-faint: #7d90a3;
  --primary: #0aa5d8;
  --primary-2: #2f6bff;
  --primary-soft: rgba(10,165,216,.12);
  --gold: #0aa5d8;
  --success: #14a06e; --success-soft: rgba(20,160,110,.12);
  --warn: #c8860f; --warn-soft: rgba(200,134,15,.14);
  --danger: #e23744; --danger-soft: rgba(226,55,68,.12);
  --info: #1f8fd0; --info-soft: rgba(31,143,208,.12);
  --sidebar-bg: rgba(10,16,24,.97);
  --sidebar-text: #aebccd;
  --shadow: 0 1px 2px rgba(20,40,60,.06), 0 10px 30px -14px rgba(20,40,60,.22);
}

* { box-sizing: border-box; margin: 0; padding: 0; }
html, body { height: 100%; }
body {
  font-family: var(--font);
  background: var(--bg);
  background-image:
    linear-gradient(rgba(125,170,210,.045) 1px, transparent 1px),
    linear-gradient(90deg, rgba(125,170,210,.045) 1px, transparent 1px),
    radial-gradient(900px 600px at 6% -10%, rgba(45,212,255,.14), transparent 60%),
    radial-gradient(820px 560px at 108% 4%, rgba(47,123,255,.12), transparent 55%),
    radial-gradient(640px 520px at 92% 118%, rgba(255,77,94,.08), transparent 60%);
  background-size: 42px 42px, 42px 42px, auto, auto, auto;
  background-attachment: fixed;
  color: var(--text);
  -webkit-font-smoothing: antialiased;
  letter-spacing: .01em;
}
h1, h2, h3, .brand-name, .page-title { font-family: var(--display); letter-spacing: .005em; }
.stat-value, .timer-display, .col-val, .ni-badge { font-family: var(--mono); }
button, input, select, textarea { font-family: inherit; font-size: inherit; }
a { color: inherit; text-decoration: none; }

/* Scrollbars */
* { scrollbar-width: thin; scrollbar-color: rgba(125,170,210,.22) transparent; }
*::-webkit-scrollbar { width: 10px; height: 10px; }
*::-webkit-scrollbar-thumb { background: rgba(125,170,210,.2); border-radius: 20px; border: 2px solid transparent; background-clip: content-box; }
*::-webkit-scrollbar-thumb:hover { background: rgba(125,170,210,.34); background-clip: content-box; }

#app { display: grid; grid-template-columns: 264px 1fr; min-height: 100vh; }

/* ============ Sidebar ============ */
.sidebar {
  background: var(--sidebar-bg);
  -webkit-backdrop-filter: blur(18px); backdrop-filter: blur(18px);
  border-right: 1px solid var(--border);
  color: var(--sidebar-text);
  display: flex; flex-direction: column;
  padding: 20px 16px; position: sticky; top: 0; height: 100vh; z-index: 40;
}
.brand { display: flex; align-items: center; gap: 13px; padding: 6px 8px 20px; }
.brand-mark {
  width: 42px; height: 42px; border-radius: 11px;
  background: linear-gradient(135deg, var(--primary), var(--primary-2));
  display: grid; place-items: center; color: #04121c; font-size: 19px; font-weight: 800;
  box-shadow: var(--glow), 0 6px 18px -6px rgba(47,123,255,.5);
}
.brand-text { display: flex; flex-direction: column; line-height: 1.12; }
.brand-name { color: #fff; font-weight: 700; font-size: 16px; letter-spacing: .02em; }
.brand-sub { font-size: 10px; color: var(--gold); letter-spacing: .28em; text-transform: uppercase; font-weight: 600; }

.nav { flex: 1; overflow-y: auto; display: flex; flex-direction: column; gap: 3px; }
.nav-group-label { font-size: 10.5px; text-transform: uppercase; letter-spacing: .18em; color: var(--text-faint); padding: 18px 12px 8px; font-weight: 600; }
.nav-item {
  position: relative; display: flex; align-items: center; gap: 12px;
  padding: 10px 13px; border-radius: var(--radius-sm);
  color: var(--sidebar-text); cursor: pointer; font-size: 14px; font-weight: 500;
  transition: background .16s, color .16s; border: none; background: none; width: 100%; text-align: left;
}
.nav-item:hover { background: rgba(125,170,210,.08); color: #fff; }
.nav-item.active {
  background: linear-gradient(90deg, rgba(45,212,255,.2), rgba(45,212,255,.04));
  color: #fff; box-shadow: inset 0 0 0 1px rgba(45,212,255,.34);
}
.nav-item.active::before {
  content: ""; position: absolute; left: -16px; top: 50%; transform: translateY(-50%);
  width: 4px; height: 22px; border-radius: 0 5px 5px 0;
  background: linear-gradient(var(--primary), var(--primary-2)); box-shadow: var(--glow);
}
.nav-item .ni-icon { width: 22px; text-align: center; font-size: 16px; opacity: .95; }
.nav-item .ni-badge { margin-left: auto; background: rgba(45,212,255,.18); color: #aef0ff; font-size: 11px; padding: 1px 8px; border-radius: 6px; font-weight: 700; }
.nav-item.active .ni-badge { background: rgba(255,255,255,.18); color: #fff; }

.sidebar-footer { border-top: 1px solid var(--border); padding-top: 12px; margin-top: 8px; }
.user-chip { display: flex; align-items: center; gap: 11px; padding: 8px; border-radius: var(--radius-sm); cursor: pointer; transition: background .16s; }
.user-chip:hover { background: rgba(125,170,210,.08); }
.avatar {
  width: 38px; height: 38px; border-radius: 10px; flex-shrink: 0;
  background: linear-gradient(135deg, var(--primary), var(--primary-2)); color: #04121c;
  display: grid; place-items: center; font-weight: 800; font-size: 14px; font-family: var(--mono);
  box-shadow: 0 4px 14px -4px rgba(45,212,255,.6); overflow: hidden;
}
.user-meta { display: flex; flex-direction: column; line-height: 1.2; overflow: hidden; }
.user-name { color: #fff; font-weight: 600; font-size: 13px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.user-role { font-size: 11px; color: var(--text-faint); }

/* ============ Main ============ */
.main { display: flex; flex-direction: column; min-width: 0; }
.topbar {
  position: sticky; top: 0; z-index: 30; display: flex; align-items: center; gap: 14px;
  background: linear-gradient(var(--bg), color-mix(in srgb, var(--bg) 55%, transparent));
  -webkit-backdrop-filter: blur(12px); backdrop-filter: blur(12px);
  padding: 15px 30px; border-bottom: 1px solid var(--border);
}
.page-title { font-size: 20px; font-weight: 700; }
.topbar-actions { margin-left: auto; display: flex; align-items: center; gap: 12px; }
.icon-btn {
  width: 40px; height: 40px; border-radius: 10px; border: 1px solid var(--border);
  background: var(--panel); color: var(--text); cursor: pointer; font-size: 16px;
  display: grid; place-items: center; transition: background .16s, border-color .16s;
}
.icon-btn:hover { background: var(--surface-2); border-color: var(--border-strong); }
.menu-toggle { display: none; }

.clock-pill {
  display: flex; align-items: center; gap: 8px; padding: 9px 15px; border-radius: 8px;
  font-size: 13px; font-weight: 600; background: var(--panel); border: 1px solid var(--border); color: var(--text-soft);
  cursor: pointer; transition: border-color .16s, color .16s; font-family: var(--mono);
}
.clock-pill .dot { width: 9px; height: 9px; border-radius: 50%; background: var(--text-faint); }
.clock-pill.on { color: var(--success); border-color: rgba(61,220,151,.5); background: var(--success-soft); box-shadow: 0 0 18px -6px rgba(61,220,151,.6); }
.clock-pill.on .dot { background: var(--success); box-shadow: 0 0 8px var(--success); animation: pulse 1.4s infinite; }
@keyframes pulse { 0%,100% { opacity: 1; } 50% { opacity: .3; } }

.content { padding: 30px; max-width: 1320px; width: 100%; }

/* ============ Generic UI ============ */
.page-head { display: flex; align-items: flex-start; gap: 16px; margin-bottom: 24px; flex-wrap: wrap; }
.page-head .ph-text h1 { font-size: 24px; font-weight: 700; }
.page-head .ph-text p { color: var(--text-soft); font-size: 14px; margin-top: 5px; }
.page-head .ph-actions { margin-left: auto; display: flex; gap: 10px; flex-wrap: wrap; }

.btn {
  display: inline-flex; align-items: center; gap: 8px; padding: 10px 16px; border-radius: var(--radius-sm);
  border: 1px solid var(--border); background: var(--panel); color: var(--text); font-weight: 600; font-size: 13.5px;
  cursor: pointer; transition: filter .16s, background .16s, border-color .16s, transform .06s, box-shadow .16s;
}
.btn:hover { background: var(--surface-2); border-color: var(--border-strong); }
.btn:active { transform: translateY(1px); }
.btn.primary {
  background: linear-gradient(135deg, var(--primary-2), var(--primary)); border-color: transparent; color: #04121c;
  box-shadow: 0 8px 20px -10px rgba(45,212,255,.9), var(--glow); font-weight: 700;
}
.btn.primary:hover { filter: brightness(1.08); }
.btn.danger { background: linear-gradient(135deg, var(--danger), #ff7a6b); border-color: transparent; color: #fff; box-shadow: 0 8px 20px -10px rgba(255,77,94,.8); }
.btn.ghost { background: transparent; border-color: transparent; }
.btn.ghost:hover { background: var(--surface-2); }
.btn.sm { padding: 6px 12px; font-size: 12.5px; }

.card {
  background: linear-gradient(180deg, var(--panel), var(--panel-2));
  border: 1px solid var(--border); border-radius: var(--radius);
  box-shadow: var(--shadow);
}
.card-pad { padding: 22px; }
.card-head { display: flex; align-items: center; gap: 10px; padding: 16px 22px; border-bottom: 1px solid var(--border); }
.card-head h3 { font-size: 15px; font-weight: 600; letter-spacing: .02em; }
.card-head .ch-actions { margin-left: auto; display: flex; gap: 8px; }

.grid { display: grid; gap: 18px; }
.cols-4 { grid-template-columns: repeat(4, 1fr); }
.cols-3 { grid-template-columns: repeat(3, 1fr); }
.cols-2 { grid-template-columns: repeat(2, 1fr); }
@media (max-width: 1100px) { .cols-4 { grid-template-columns: repeat(2, 1fr); } .cols-3 { grid-template-columns: repeat(2,1fr);} }
@media (max-width: 720px) { .cols-4, .cols-3, .cols-2 { grid-template-columns: 1fr; } }

/* Stat cards */
.stat {
  position: relative; overflow: hidden;
  background: linear-gradient(180deg, var(--panel), var(--panel-2));
  border: 1px solid var(--border); border-radius: var(--radius); padding: 19px 21px;
  box-shadow: var(--shadow); display: flex; flex-direction: column; gap: 10px;
  transition: transform .18s, border-color .18s;
}
.stat::after { content: ""; position: absolute; inset: 0 0 auto 0; height: 2px; background: linear-gradient(90deg, var(--primary), transparent 70%); opacity: .8; }
.stat:hover { transform: translateY(-3px); border-color: var(--border-strong); box-shadow: var(--shadow), var(--glow); }
.stat .stat-top { display: flex; align-items: center; justify-content: space-between; }
.stat .stat-ico { width: 42px; height: 42px; border-radius: 10px; display: grid; place-items: center; font-size: 19px; }
.stat .stat-label { color: var(--text-soft); font-size: 12.5px; font-weight: 500; text-transform: uppercase; letter-spacing: .04em; }
.stat .stat-value { font-size: 28px; font-weight: 700; letter-spacing: -.01em; }
.stat .stat-trend { font-size: 12.5px; font-weight: 600; }
.trend-up { color: var(--success); }
.trend-down { color: var(--danger); }

.bg-primary { background: var(--primary-soft); color: var(--primary); box-shadow: inset 0 0 0 1px rgba(45,212,255,.3); }
.bg-success { background: var(--success-soft); color: var(--success); box-shadow: inset 0 0 0 1px rgba(61,220,151,.3); }
.bg-warn { background: var(--warn-soft); color: var(--warn); box-shadow: inset 0 0 0 1px rgba(255,176,32,.3); }
.bg-danger { background: var(--danger-soft); color: var(--danger); box-shadow: inset 0 0 0 1px rgba(255,77,94,.3); }
.bg-info { background: var(--info-soft); color: var(--info); box-shadow: inset 0 0 0 1px rgba(56,189,248,.3); }

/* Tables */
.table-wrap { width: 100%; overflow-x: auto; }
table.tbl { width: 100%; border-collapse: collapse; font-size: 13.5px; }
table.tbl th { text-align: left; padding: 12px 18px; color: var(--text-faint); font-weight: 600; font-size: 10.5px; text-transform: uppercase; letter-spacing: .09em; border-bottom: 1px solid var(--border); }
table.tbl td { padding: 14px 18px; border-bottom: 1px solid var(--border); vertical-align: middle; }
table.tbl tr:last-child td { border-bottom: none; }
table.tbl tbody tr { transition: background .12s; }
table.tbl tbody tr:hover { background: rgba(45,212,255,.06); }
.row-main { font-weight: 600; }
.row-sub { color: var(--text-faint); font-size: 12px; }

/* Badges — threat-level style */
.badge { display: inline-flex; align-items: center; gap: 6px; padding: 3px 10px; border-radius: 6px; font-size: 11.5px; font-weight: 600; white-space: nowrap; text-transform: uppercase; letter-spacing: .03em; border: 1px solid currentColor; }
.badge::before { content: ""; width: 6px; height: 6px; border-radius: 50%; background: currentColor; box-shadow: 0 0 6px currentColor; }
.b-applied { background: var(--info-soft); color: var(--info); }
.b-interview { background: var(--warn-soft); color: var(--warn); }
.b-offer { background: var(--success-soft); color: var(--success); }
.b-rejected { background: var(--danger-soft); color: var(--danger); }
.b-draft, .b-pending { background: var(--warn-soft); color: var(--warn); }
.b-sent, .b-invited { background: var(--info-soft); color: var(--info); }
.b-signed, .b-active, .b-paid, .b-approved, .b-hired { background: var(--success-soft); color: var(--success); }
.b-declined, .b-expired, .b-overdue { background: var(--danger-soft); color: var(--danger); }
.b-screening, .b-review { background: var(--primary-soft); color: var(--primary); }

/* Empty state */
.empty { text-align: center; padding: 50px 20px; color: var(--text-faint); }
.empty .em-ico { font-size: 42px; opacity: .5; margin-bottom: 12px; }
.empty p { font-size: 14px; margin-bottom: 16px; }

/* Forms */
.field { display: flex; flex-direction: column; gap: 7px; margin-bottom: 15px; }
.field label { font-size: 13px; font-weight: 600; color: var(--text-soft); }
.field input, .field select, .field textarea {
  padding: 11px 13px; border: 1px solid var(--border); border-radius: var(--radius-sm);
  background: var(--surface); color: var(--text); outline: none; transition: border .16s, box-shadow .16s;
}
.field input:focus, .field select:focus, .field textarea:focus { border-color: var(--primary); box-shadow: 0 0 0 3px var(--primary-soft); }
.field textarea { resize: vertical; min-height: 86px; }
.field-row { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; }
@media (max-width: 540px) { .field-row { grid-template-columns: 1fr; } }

/* Modal */
.modal-host { position: fixed; inset: 0; z-index: 100; display: none; }
.modal-host.open { display: grid; place-items: center; }
.modal-backdrop { position: absolute; inset: 0; background: rgba(4,8,14,.7); -webkit-backdrop-filter: blur(5px); backdrop-filter: blur(5px); }
.modal-card {
  position: relative; background: linear-gradient(180deg, #1a2532, #141d28);
  border-radius: var(--radius); width: min(580px, calc(100vw - 32px)); max-height: calc(100vh - 48px); overflow-y: auto;
  box-shadow: 0 30px 80px -20px rgba(0,0,0,.9), var(--glow); border: 1px solid var(--border-strong);
}
.modal-card .m-head { display: flex; align-items: center; padding: 18px 24px; border-bottom: 1px solid var(--border); }
.modal-card .m-head h3 { font-size: 17px; font-weight: 600; }
.modal-card .m-body { padding: 22px 24px; }
.modal-card .m-foot { padding: 16px 24px; border-top: 1px solid var(--border); display: flex; justify-content: flex-end; gap: 10px; }

/* Toast */
.toast-host { position: fixed; bottom: 26px; right: 26px; z-index: 200; display: flex; flex-direction: column; gap: 10px; }
.toast {
  background: linear-gradient(180deg, #1e2a38, #16202b); color: var(--text); padding: 13px 19px; border-radius: var(--radius-sm);
  font-size: 13.5px; font-weight: 600; box-shadow: 0 16px 40px -16px rgba(0,0,0,.9); border: 1px solid var(--border-strong);
  animation: toastIn .25s ease; display: flex; align-items: center; gap: 9px; max-width: 360px;
}
.toast.success { border-color: rgba(61,220,151,.5); box-shadow: 0 0 24px -8px rgba(61,220,151,.6); color: var(--success); }
.toast.error { border-color: rgba(255,77,94,.5); box-shadow: 0 0 24px -8px rgba(255,77,94,.6); color: var(--danger); }
@keyframes toastIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: none; } }

.scrim { display: none; }

/* Misc layout helpers */
.list { display: flex; flex-direction: column; }
.list-item { display: flex; align-items: center; gap: 13px; padding: 14px 0; border-bottom: 1px solid var(--border); }
.list-item:last-child { border-bottom: none; }
.li-ico { width: 38px; height: 38px; border-radius: 9px; display: grid; place-items: center; flex-shrink: 0; font-size: 16px; }
.li-text { flex: 1; min-width: 0; }
.li-title { font-weight: 600; font-size: 13.5px; }
.li-sub { color: var(--text-faint); font-size: 12px; }
.li-time { color: var(--text-faint); font-size: 12px; white-space: nowrap; text-align: right; font-family: var(--mono); }

.flex { display: flex; } .between { justify-content: space-between; } .center { align-items: center; }
.gap-8 { gap: 8px; } .gap-12 { gap: 12px; } .gap-16 { gap: 16px; }
.mt-8 { margin-top: 8px; } .mt-16 { margin-top: 16px; } .mt-24 { margin-top: 24px; }
.muted { color: var(--text-soft); } .faint { color: var(--text-faint); } .right { text-align: right; } .nowrap { white-space: nowrap; }
.chip { display: inline-flex; align-items: center; gap: 6px; padding: 5px 11px; border-radius: 7px; background: var(--surface-2); border: 1px solid var(--border); font-size: 12px; color: var(--text-soft); font-weight: 500; }
.search-input { flex: 1; padding: 11px 15px; border: 1px solid var(--border); border-radius: var(--radius-sm); background: var(--surface); color: var(--text); outline: none; min-width: 180px; }
.search-input:focus { border-color: var(--primary); box-shadow: 0 0 0 3px var(--primary-soft); }

/* Big timer */
.timer-display { font-size: 54px; font-weight: 700; letter-spacing: .03em; font-variant-numeric: tabular-nums; color: var(--primary); text-shadow: 0 0 26px rgba(45,212,255,.5); }

/* Progress bar */
.bar { height: 8px; border-radius: 8px; background: var(--surface-2); overflow: hidden; }
.bar > span { display: block; height: 100%; border-radius: 8px; background: linear-gradient(90deg, var(--primary-2), var(--primary)); }

/* Bar chart */
.chart { display: flex; align-items: flex-end; gap: 14px; height: 190px; padding-top: 10px; }
.chart .bar-col { flex: 1; display: flex; flex-direction: column; align-items: center; gap: 8px; height: 100%; justify-content: flex-end; }
.chart .bar-col .col-fill { width: 100%; max-width: 44px; border-radius: 6px 6px 0 0; background: linear-gradient(180deg, var(--primary), var(--primary-2)); min-height: 4px; transition: height .4s; box-shadow: 0 0 18px -4px rgba(45,212,255,.7); }
.chart .bar-col .col-label { font-size: 11.5px; color: var(--text-faint); font-weight: 600; }
.chart .bar-col .col-val { font-size: 12px; font-weight: 700; }

/* Donut legend */
.legend { display: flex; flex-direction: column; gap: 11px; }
.legend-item { display: flex; align-items: center; gap: 10px; font-size: 13px; }
.legend-dot { width: 11px; height: 11px; border-radius: 3px; box-shadow: 0 0 8px currentColor; }

/* File drop */
.dropzone { border: 2px dashed var(--border-strong); border-radius: var(--radius); padding: 36px; text-align: center; color: var(--text-faint); cursor: pointer; transition: border .16s, background .16s, color .16s; background: var(--panel-2); }
.dropzone:hover, .dropzone.drag { border-color: var(--primary); background: var(--primary-soft); color: var(--primary); box-shadow: var(--glow); }
.dropzone .dz-ico { font-size: 34px; margin-bottom: 8px; }

/* Responsive sidebar */
@media (max-width: 900px) {
  #app { grid-template-columns: 1fr; }
  .sidebar { position: fixed; left: 0; top: 0; bottom: 0; width: 264px; transform: translateX(-100%); transition: transform .24s ease; }
  .sidebar.open { transform: none; }
  .menu-toggle { display: grid; }

/* ============================================================
   Store — localStorage-backed data layer with seed data
   ============================================================ */
(function () {
  const KEY = "workspace_dashboard_v1";

  const uid = () => Date.now().toString(36) + Math.random().toString(36).slice(2, 7);
  const daysAgo = (n) => new Date(Date.now() - n * 864e5).toISOString();
  const daysAhead = (n) => new Date(Date.now() + n * 864e5).toISOString();

  function seed() {
    return {
      profile: {
        name: "Noah Morgan",
        title: "Operations Lead",
        email: "",
        phone: "",
        location: "",
        role: "Admin",
        hourlyRate: 0,
        gmailClientId: "",
        gmailLastSync: null,
      },
      // ---- Personal ----
      applications: [],
      timeEntries: [],
      activeClocks: {}, // { memberId: { member, project, clockIn } }
      jobMarket: [],
      savedJobs: [],
      gmailSyncedIds: [],
      liveJobs: [],
      liveJobsFetched: null,
      // ---- Workspace ----
      sops: [],
      contracts: [],
      transactions: [],
      applicants: [],
      team: [],
      cleanSlate: true,
    };
  }

  let state = load();

  function load() {
    let s = null;
    try {
      const raw = localStorage.getItem(KEY);
      if (raw) s = JSON.parse(raw);
    } catch (e) { /* ignore */ }
    if (!s) { s = seed(); persist(s); return s; }

    // One-time clean-slate cleanup: clear all the sample data while keeping
    // the user's own settings (profile, Gmail Client ID, live Adzuna jobs).
    if (!s.cleanSlate) {
      s.applications = [];
      s.timeEntries = [];
      s.activeClocks = {};
      s.jobMarket = [];
      s.savedJobs = [];
      s.gmailSyncedIds = [];
      if (s.profile) s.profile.gmailLastSync = null;
      s.sops = [];
      s.contracts = [];
      s.transactions = [];
      s.applicants = [];
      s.team = [];
      s.cleanSlate = true;
      persist(s);
    }
    return s;
  }
  function persist(s) {
    try { localStorage.setItem(KEY, JSON.stringify(s || state)); } catch (e) {}
  }

  const Store = {
    uid,
    get: () => state,
    save: () => persist(state),
    reset() { state = seed(); persist(state); },

    // Generic collection helpers
    add(coll, item) {
      item.id = item.id || uid();
      state[coll].unshift(item);
      persist(state);
      return item;
    },
    update(coll, id, patch) {
      const list = state[coll];
      const i = list.findIndex((x) => x.id === id);
      if (i > -1) { list[i] = { ...list[i], ...patch }; persist(state); return list[i]; }
      return null;
    },
    remove(coll, id) {
      state[coll] = state[coll].filter((x) => x.id !== id);
      persist(state);
    },
    find(coll, id) { return (state[coll] || []).find((x) => x.id === id); },

    setProfile(patch) { state.profile = { ...state.profile, ...patch }; persist(state); },

    setLiveJobs(jobs) { state.liveJobs = jobs || []; state.liveJobsFetched = new Date().toISOString(); persist(state); },

    // Time clock — per team member
    clockInMember(memberId, memberName, project) {
      if (!state.activeClocks) state.activeClocks = {};
      state.activeClocks[memberId] = { member: memberName, project: project || "General", clockIn: new Date().toISOString() };
      persist(state);
    },
    clockOutMember(memberId) {
      const a = state.activeClocks && state.activeClocks[memberId];
      if (!a) return null;
      const entry = { id: uid(), memberId, member: a.member, project: a.project, clockIn: a.clockIn, clockOut: new Date().toISOString() };
      state.timeEntries.unshift(entry);
      delete state.activeClocks[memberId];
      persist(state);
      return entry;
    },
  };

  window.Store = Store;
})();

/* ============================================================
   UI — shared helpers: format, modal, toast, dom
   ============================================================ */
(function () {
  const UI = {};

  // ---- escaping & dom ----
  UI.esc = (s) =>
    String(s ?? "").replace(/[&<>"']/g, (c) => ({ "&": "&amp;", "<": "&lt;", ">": "&gt;", '"': "&quot;", "'": "&#39;" }[c]));

  UI.el = (html) => {
    const t = document.createElement("template");
    t.innerHTML = html.trim();
    return t.content.firstElementChild;
  };

  // ---- formatting ----
  UI.money = (n, dec = 0) =>
    "$" + Number(n || 0).toLocaleString("en-US", { minimumFractionDigits: dec, maximumFractionDigits: dec });

  UI.date = (iso) => {
    if (!iso) return "—";
    const d = new Date(iso);
    return d.toLocaleDateString("en-US", { month: "short", day: "numeric", year: "numeric" });
  };
  UI.dateShort = (iso) => {
    if (!iso) return "—";
    return new Date(iso).toLocaleDateString("en-US", { month: "short", day: "numeric" });
  };
  UI.time = (iso) => {
    if (!iso) return "—";
    return new Date(iso).toLocaleTimeString("en-US", { hour: "numeric", minute: "2-digit" });
  };
  UI.ago = (iso) => {
    if (!iso) return "—";
    const s = Math.floor((Date.now() - new Date(iso)) / 1000);
    if (s < 60) return "just now";
    const m = Math.floor(s / 60); if (m < 60) return m + "m ago";
    const h = Math.floor(m / 60); if (h < 24) return h + "h ago";
    const d = Math.floor(h / 24); if (d < 30) return d + "d ago";
    const mo = Math.floor(d / 30); if (mo < 12) return mo + "mo ago";
    return Math.floor(mo / 12) + "y ago";
  };
  UI.until = (iso) => {
    if (!iso) return "—";
    const d = Math.ceil((new Date(iso) - Date.now()) / 864e5);
    if (d === 0) return "today";
    if (d < 0) return Math.abs(d) + "d ago";
    return "in " + d + "d";
  };
  UI.hours = (ms) => {
    const h = ms / 36e5;
    return h.toFixed(1) + "h";
  };
  UI.dur = (ms) => {
    const total = Math.max(0, Math.floor(ms / 1000));
    const h = String(Math.floor(total / 3600)).padStart(2, "0");
    const m = String(Math.floor((total % 3600) / 60)).padStart(2, "0");
    const s = String(total % 60).padStart(2, "0");
    return `${h}:${m}:${s}`;
  };
  UI.fileSize = (b) => {
    if (b < 1024) return b + " B";
    if (b < 1048576) return (b / 1024).toFixed(0) + " KB";
    return (b / 1048576).toFixed(1) + " MB";
  };
  UI.initials = (name) =>
    String(name || "?").trim().split(/\s+/).slice(0, 2).map((w) => w[0]).join("").toUpperCase();

  UI.cap = (s) => String(s || "").charAt(0).toUpperCase() + String(s || "").slice(1);

  UI.badge = (status) =>
    `<span class="badge b-${UI.esc(status)}">${UI.cap(status)}</span>`;

  // ---- toast ----
  UI.toast = (msg, type = "") => {
    const host = document.getElementById("toastHost");
    const t = UI.el(`<div class="toast ${type}">${type === "success" ? "✓ " : type === "error" ? "✕ " : ""}${UI.esc(msg)}</div>`);
    host.appendChild(t);
    setTimeout(() => { t.style.opacity = "0"; t.style.transform = "translateY(8px)"; t.style.transition = "all .25s"; }, 2600);
    setTimeout(() => t.remove(), 2900);
  };

  // ---- modal ----
  let onClose = null;
  UI.modal = ({ title, body, footer, onMount }) => {
    const host = document.getElementById("modalHost");
    const card = document.getElementById("modalCard");
    card.innerHTML = `
      <div class="m-head">
        <h3>${UI.esc(title)}</h3>
        <button class="icon-btn" data-modal-close style="margin-left:auto">✕</button>
      </div>
      <div class="m-body">${body}</div>
      ${footer ? `<div class="m-foot">${footer}</div>` : ""}`;
    host.classList.add("open");
    host.setAttribute("aria-hidden", "false");
    if (onMount) onMount(card);
    card.querySelectorAll("[data-modal-close]").forEach((b) => (b.onclick = UI.closeModal));
    document.getElementById("modalBackdrop").onclick = UI.closeModal;
  };
  UI.closeModal = () => {
    const host = document.getElementById("modalHost");
    host.classList.remove("open");
    host.setAttribute("aria-hidden", "true");
    document.getElementById("modalCard").innerHTML = "";
  };

  UI.confirm = (msg, onYes, { danger = true, yes = "Delete" } = {}) => {
    UI.modal({
      title: "Are you sure?",
      body: `<p class="muted">${UI.esc(msg)}</p>`,
      footer: `<button class="btn" data-modal-close>Cancel</button>
               <button class="btn ${danger ? "danger" : "primary"}" id="confirmYes">${UI.esc(yes)}</button>`,
      onMount: (card) => {
        card.querySelector("#confirmYes").onclick = () => { UI.closeModal(); onYes(); };
      },
    });
  };

  // Build a form from field defs, return values on submit
  UI.formModal = ({ title, fields, values = {}, submitLabel = "Save", onSubmit }) => {
    const fieldHtml = fields
      .map((f) => {
        const v = values[f.name] ?? f.value ?? "";
        if (f.type === "textarea")
          return `<div class="field"><label>${UI.esc(f.label)}</label><textarea name="${f.name}" placeholder="${UI.esc(f.placeholder || "")}">${UI.esc(v)}</textarea></div>`;
        if (f.type === "select")
          return `<div class="field"><label>${UI.esc(f.label)}</label><select name="${f.name}">${f.options
            .map((o) => `<option value="${UI.esc(o.value)}" ${String(v) === String(o.value) ? "selected" : ""}>${UI.esc(o.label)}</option>`)
            .join("")}</select></div>`;
        const t = f.type || "text";
        return `<div class="field"><label>${UI.esc(f.label)}</label><input type="${t}" name="${f.name}" placeholder="${UI.esc(f.placeholder || "")}" value="${UI.esc(v)}" ${f.required ? "required" : ""}/></div>`;
      });
    // group pairs marked with f.half into rows
    let body = "<form id='modalForm'>";
    for (let i = 0; i < fields.length; i++) {
      if (fields[i].half && fields[i + 1] && fields[i + 1].half) {
        body += `<div class="field-row">${fieldHtml[i]}${fieldHtml[i + 1]}</div>`;
        i++;
      } else body += fieldHtml[i];
    }
    body += "</form>";

    UI.modal({
      title,
      body,
      footer: `<button class="btn" data-modal-close>Cancel</button>
               <button class="btn primary" id="formSubmit">${UI.esc(submitLabel)}</button>`,
      onMount: (card) => {
        const form = card.querySelector("#modalForm");
        const submit = () => {
          const data = {};
          fields.forEach((f) => {
            const node = form.elements[f.name];
            data[f.name] = node ? node.value.trim() : "";
          });
          const missing = fields.find((f) => f.required && !data[f.name]);
          if (missing) { UI.toast("Please fill in " + missing.label, "error"); return; }
          UI.closeModal();
          onSubmit(data);
        };
        card.querySelector("#formSubmit").onclick = submit;
        form.onsubmit = (e) => { e.preventDefault(); submit(); };
        const first = form.querySelector("input,select,textarea");
        if (first) first.focus();
      },
    });
  };

  UI.empty = (icon, text, actionHtml = "") =>
    `<div class="empty"><div class="em-ico">${icon}</div><p>${UI.esc(text)}</p>${actionHtml}</div>`;

  window.UI = UI;

  // Global ESC to close modal
  document.addEventListener("keydown", (e) => {
    if (e.key === "Escape") UI.closeModal();
  });
})();

/* ============================================================
   Gmail — in-browser, read-only sync for Job Applications.
   Uses Google Identity Services (token flow) + Gmail REST API.
   No backend: the access token lives only in memory for the session.
   ============================================================ */
(function () {
  const S = window.Store;
  const SCOPE = "https://www.googleapis.com/auth/gmail.readonly";

  function gisReady() {
    return window.google && google.accounts && google.accounts.oauth2;
  }

  // Pop the Google consent screen and resolve with an access token.
  function getToken(clientId) {
    return new Promise((resolve, reject) => {
      if (!gisReady())
        return reject(new Error("Google sign-in didn't load. Check your connection, then retry."));
      try {
        const client = google.accounts.oauth2.initTokenClient({
          client_id: clientId,
          scope: SCOPE,
          callback: (resp) => {
            if (resp && resp.access_token) resolve(resp.access_token);
            else reject(new Error("Authorization was cancelled."));
          },
          error_callback: (err) =>
            reject(new Error(err && err.message ? err.message : "Authorization error.")),
        });
        client.requestAccessToken({ prompt: "" });
      } catch (e) {
        reject(e);
      }
    });
  }

  async function api(url, token) {
    const r = await fetch(url, { headers: { Authorization: "Bearer " + token } });
    if (r.status === 401 || r.status === 403)
      throw new Error("Gmail denied access. Check the OAuth Client ID, that Gmail API is enabled, and that you're a test user.");
    if (!r.ok) throw new Error("Gmail API error " + r.status);
    return r.json();
  }

  // ---- classification heuristics ----
  const RX = {
    rejected: /unfortunately|we regret|regret to inform|not (be )?moving forward|won'?t be moving forward|decided (not|to not)|other candidates|move forward with other|position (has been|was) filled|not be (proceeding|progressing)|not selected|will not be progressing|pursue other candidates|after careful (consideration|review)/i,
    offer: /pleased to offer|excited to offer|offer letter|extend (you )?an offer|job offer|formally offer|happy to offer|offer of employment/i,
    interview: /interview|phone screen|technical screen|schedule (a|some) time|set up a (call|time|chat)|your availability|next steps|like to (chat|talk|speak|meet|connect)|video call|hiring manager would|recruiter (call|chat|screen)/i,
    applied: /thank you for applying|thanks for applying|application (has been )?received|we(?:'| ha)ve received your application|successfully (applied|submitted)|application (was )?submitted|received your application|application confirmation|thank you for your (interest|application)|we got your application/i,
  };

  function classify(text) {
    if (RX.rejected.test(text)) return "rejected";
    if (RX.offer.test(text)) return "offer";
    if (RX.interview.test(text)) return "interview";
    if (RX.applied.test(text)) return "applied";
    return null; // not a job email we recognize
  }

  function getHeader(headers, name) {
    const h = headers.find((x) => x.name.toLowerCase() === name.toLowerCase());
    return h ? h.value : "";
  }

  const ATS = /(greenhouse|lever|workday|myworkday|icims|smartrecruiters|ashbyhq|jobvite|taleo|bamboohr|gmail|googlemail|noreply|no-reply|linkedin|indeed|ziprecruiter|hire|recruit)/i;

  function parseCompany(from, subject) {
    let name = from.replace(/<[^>]*>/, "").replace(/["']/g, "").trim();
    const domMatch = from.match(/<[^@]*@([^>]+)>/) || from.match(/@([^\s>]+)/) || [];
    const domain = (domMatch[1] || "").toLowerCase();
    let company = name
      .replace(/\b(careers?|recruiting|recruitment|talent|hr|jobs?|hiring|team|notifications?|no-?reply|the|via .*)\b/gi, "")
      .replace(/[|@•·].*$/, "")
      .replace(/\s*-\s*.*$/, "")
      .trim();
    if ((!company || company.length < 2) && domain && !ATS.test(domain)) company = domain.split(".")[0];
    if (!company || company.length < 2) {
      const m = subject.match(/\bat\s+([A-Z][\w&.\- ]{1,40})/);
      if (m) company = m[1].trim();
    }
    company = company.replace(/\s{2,}/g, " ").trim();
    return company ? company.replace(/\b\w/g, (c) => c.toUpperCase()) : (domain || "Unknown");
  }

  function parseRole(subject) {
    const m =
      subject.match(/apply(?:ing)? (?:to|for)(?: the)?\s+(.+?)(?:\s+(?:at|with|position|role)\b|[-|]|$)/i) ||
      subject.match(/application (?:for|to)(?: the)?\s+(.+?)(?:\s+(?:at|with|position|role)\b|[-|]|$)/i) ||
      subject.match(/your\s+(.+?)\s+application/i);
    if (m) {
      const r = m[1].trim();
      if (r.length > 2 && r.length < 60) return r.replace(/\b\w/g, (c) => c.toUpperCase());
    }
    return "";
  }

  const RANK = { applied: 1, interview: 2, offer: 3, rejected: 3 };

  async function sync({ onProgress } = {}) {
    const clientId = (S.get().profile.gmailClientId || "").trim();
    if (!clientId) throw new Error("NO_CLIENT_ID");

    onProgress && onProgress("Requesting Google authorization…");
    const token = await getToken(clientId);

    onProgress && onProgress("Searching your inbox…");
    const q = encodeURIComponent(
      'newer_than:1y (subject:(application OR applying OR interview OR offer OR "thank you for applying") OR "your application" OR "application received" OR "we received your application" OR "regret to inform" OR "pleased to offer")'
    );
    const list = await api(
      `https://gmail.googleapis.com/gmail/v1/users/me/messages?maxResults=100&q=${q}`,
      token
    );
    const ids = (list.messages || []).map((m) => m.id);

    const synced = new Set(S.get().gmailSyncedIds || []);
    const apps = S.get().applications;
    let added = 0, updated = 0;

    for (let i = 0; i < ids.length; i++) {
      const id = ids[i];
      onProgress && onProgress(`Reading message ${i + 1} of ${ids.length}…`);
      if (synced.has(id)) continue;
      synced.add(id);
      let msg;
      try {
        msg = await api(
          `https://gmail.googleapis.com/gmail/v1/users/me/messages/${id}?format=metadata&metadataHeaders=From&metadataHeaders=Subject&metadataHeaders=Date`,
          token
        );
      } catch (e) {
        continue;
      }
      const headers = (msg.payload && msg.payload.headers) || [];
      const from = getHeader(headers, "From");
      const subject = getHeader(headers, "Subject");
      const dateStr = getHeader(headers, "Date");
      const snippet = msg.snippet || "";
      const status = classify(subject + " " + snippet);
      if (!status) continue;

      const company = parseCompany(from, subject);
      const role = parseRole(subject) || (subject || "").slice(0, 50) || "Unknown role";
      const when = dateStr ? new Date(dateStr).toISOString() : new Date().toISOString();

      const existing = apps.find(
        (a) => a.company && a.company.toLowerCase() === company.toLowerCase()
      );
      if (existing) {
        const advance = (RANK[status] || 0) >= (RANK[existing.status] || 0);
        if (advance) {
          S.update("applications", existing.id, {
            status,
            notes: (existing.notes ? existing.notes + "\n" : "") + "Gmail: " + subject,
          });
          updated++;
        }
      } else {
        S.add("applications", {
          company, role, status, location: "", salary: "", source: "Gmail",
          applied: when, notes: "Imported from Gmail: " + subject, interviewDate: null,
        });
        added++;
      }
    }

    S.get().gmailSyncedIds = [...synced];
    S.get().profile.gmailLastSync = new Date().toISOString();
    S.save();
    return { added, updated, scanned: ids.length };
  }

  window.Gmail = { sync };
})();

/* ============================================================
   Auth — Supabase login / sign-up + role (admin vs employee).
   If Supabase isn't configured/loaded, Auth.enabled is false and the
   app runs in single-user (no-login) mode exactly as before.
   ============================================================ */
(function () {
  const cfg = window.APP_CONFIG || {};
  const ready = !!(cfg.SUPABASE_URL && cfg.SUPABASE_ANON_KEY && window.supabase && window.supabase.createClient);
  const client = ready ? window.supabase.createClient(cfg.SUPABASE_URL, cfg.SUPABASE_ANON_KEY) : null;

  let session = null;
  let profile = null;

  async function loadProfile() {
    if (!session) { profile = null; return null; }
    const { data, error } = await client.from("profiles").select("*").eq("id", session.user.id).single();
    if (error) { profile = null; return null; }
    profile = data;
    return data;
  }

  const Auth = {
    enabled: ready,
    client: () => client,
    user: () => (session ? session.user : null),
    profile: () => profile,
    role: () => (profile ? profile.role : null),
    isAdmin: () => !!(profile && profile.role === "admin"),

    async init() {
      if (!ready) return false;
      try {
        const { data } = await client.auth.getSession();
        session = data.session || null;
        if (session) await loadProfile();
        client.auth.onAuthStateChange((_evt, s) => { session = s; });
        return !!session;
      } catch (e) { return false; }
    },
    async signIn(email, password) {
      const { data, error } = await client.auth.signInWithPassword({ email, password });
      if (error) throw error;
      session = data.session;
      await loadProfile();
      return data;
    },
    async signUp(email, password, fullName) {
      const { data, error } = await client.auth.signUp({ email, password, options: { data: { full_name: fullName } } });
      if (error) throw error;
      session = data.session;
      if (session) await loadProfile();
      return data; // session may be null if email confirmation is on
    },
    async signOut() {
      if (client) await client.auth.signOut();
      session = null; profile = null;
    },
    reloadProfile: loadProfile,
  };

  window.Auth = Auth;
})();

/* ============================================================
   DB — Supabase data layer (active only when logged in).
   Loads shared data into memory after auth; views read synchronously
   from the cache and call async mutators that re-fetch + re-render.
   ============================================================ */
(function () {
  const A = window.Auth;
  const DB = {
    active: false,
    viewAs: null, // admin "view as member": a profile id being inspected
    cache: { profiles: [], time_entries: [], contracts: [], notifications: [] },
  };

  const c = () => A.client();
  DB.me = () => (A && A.profile());
  DB.isAdmin = () => !!(A && A.isAdmin());
  DB.targetId = () => DB.viewAs || (DB.me() && DB.me().id);
  DB.target = () => DB.cache.profiles.find((p) => p.id === DB.targetId()) || DB.me();
  DB.displayName = (p) => (p ? (p.full_name || p.email || "User") : "User");

  DB.load = async function () {
    if (!(A && A.enabled && A.user())) return;
    DB.active = true;
    const [pf, te, ct, nt] = await Promise.all([
      c().from("profiles").select("*").order("created_at", { ascending: true }),
      c().from("time_entries").select("*").order("clock_in", { ascending: false }),
      c().from("contracts").select("*").order("created_at", { ascending: false }),
      c().from("notifications").select("*").order("created_at", { ascending: false }),
    ]);
    DB.cache.profiles = pf.data || [];
    DB.cache.time_entries = te.data || [];
    DB.cache.contracts = ct.data || [];
    DB.cache.notifications = nt.data || [];
  };
  DB.reload = DB.load;

  // ---- profiles ----
  DB.profiles = () => DB.cache.profiles;
  DB.profile = (id) => DB.cache.profiles.find((p) => p.id === id);
  DB.updateProfile = async (id, patch) => { await c().from("profiles").update(patch).eq("id", id); await DB.load(); };
  DB.removeProfile = async (id) => { await c().from("profiles").delete().eq("id", id); await DB.load(); };

  // ---- time entries ----
  DB.timeEntries = () => DB.cache.time_entries;
  DB.activeEntryFor = (uid) => DB.cache.time_entries.find((e) => e.user_id === uid && !e.clock_out);
  DB.clockIn = async (uid, project) => { await c().from("time_entries").insert({ user_id: uid, project: project || "General" }); await DB.load(); };
  DB.clockOut = async (entryId) => { await c().from("time_entries").update({ clock_out: new Date().toISOString() }).eq("id", entryId); await DB.load(); };
  DB.removeTimeEntry = async (id) => { await c().from("time_entries").delete().eq("id", id); await DB.load(); };

  // ---- contracts ----
  DB.contracts = () => DB.cache.contracts;
  DB.addContract = async (rec) => { rec.created_by = DB.me().id; await c().from("contracts").insert(rec); await DB.load(); };
  DB.updateContract = async (id, patch) => { await c().from("contracts").update(patch).eq("id", id); await DB.load(); };
  DB.removeContract = async (id) => { await c().from("contracts").delete().eq("id", id); await DB.load(); };
  DB.signContract = async (ct) => {
    await c().from("contracts").update({ status: "signed", signed_at: new Date().toISOString() }).eq("id", ct.id);
    const me = DB.me();
    const admins = DB.cache.profiles.filter((p) => p.role === "admin");
    for (const a of admins) {
      await c().from("notifications").insert({ user_id: a.id, type: "contract_signed", message: `${DB.displayName(me)} signed "${ct.title}"` });
    }
    await DB.load();
  };

  // ---- notifications ----
  DB.notifications = () => DB.cache.notifications;
  DB.unreadCount = () => DB.cache.notifications.filter((n) => !n.read).length;
  DB.markAllRead = async () => {
    const ids = DB.cache.notifications.filter((n) => !n.read).map((n) => n.id);
    if (ids.length) { await c().from("notifications").update({ read: true }).in("id", ids); await DB.load(); }
  };

  window.DB = DB;
})();

   Views — one entry per route. Each: {title, subtitle, render(), mount(root)}
   ============================================================ */

    </div>`;

  const rowActions = (id, edit = true) => `
    <div class="flex gap-8 nowrap">
      ${edit ? `<button class="btn sm ghost" data-act="edit" data-id="${id}">Edit</button>` : ""}
      <button class="btn sm ghost" data-act="del" data-id="${id}" style="color:var(--danger)">Delete</button>
    </div>`;

  const barChart = (data) => {
    const max = Math.max(1, ...data.map((d) => d.value));
    return `<div class="chart">${data
      .map(
        (d) => `<div class="bar-col">
          <span class="col-val">${d.value}</span>
          <div class="col-fill" style="height:${(d.value / max) * 100}%"></div>
          <span class="col-label">${U.esc(d.label)}</span>
        </div>`
      )
      .join("")}</div>`;
  };

  // ---- import parsing (CSV or pasted email subjects) ----
  function normStatus(s) {
    s = (s || "").toLowerCase();
    if (/reject|declin|unfortunate|regret|not (be )?moving|filled|other candidate|not selected/.test(s)) return "rejected";
    if (/offer/.test(s)) return "offer";
    if (/interview|screen|phone|onsite|next step/.test(s)) return "interview";
    if (/appl|submit/.test(s)) return "applied";
    return null;
  }
  function parseImport(text) {
    const lines = (text || "").split(/\r?\n/).map((l) => l.trim()).filter(Boolean);
    if (!lines.length) return [];
    const out = [];
    let startIdx = 0, cols = null;
    if (lines[0].toLowerCase().includes("company")) { cols = lines[0].split(",").map((c) => c.trim().toLowerCase()); startIdx = 1; }
    const dataLines = lines.slice(startIdx);
    const isCSV = dataLines.filter((l) => l.includes(",")).length >= Math.max(1, Math.ceil(dataLines.length / 2));
    for (let i = startIdx; i < lines.length; i++) {
      const line = lines[i];
      if (isCSV && line.includes(",")) {
        const parts = line.split(",").map((p) => p.trim());
        if (cols) {
          const rec = {}; cols.forEach((c, idx) => (rec[c] = parts[idx] || ""));
          out.push({ company: rec.company, role: rec.role || rec.position || rec.title || "", status: normStatus(rec.status) || "applied", location: rec.location || "", salary: rec.salary || "", applied: rec.date ? new Date(rec.date).toISOString() : null });
        } else {
          out.push({ company: parts[0], role: parts[1] || "", status: normStatus(parts[2]) || "applied", applied: parts[3] ? new Date(parts[3]).toISOString() : null });
        }
      } else {
        const status = normStatus(line) || "applied";
        let company = "", role = "";
        const m = line.match(/(?:from|at|@|with|—|-)\s+([A-Z][\w&.\- ]{1,40})\s*$/);
        if (m) company = m[1].trim();
        const rm = line.match(/(?:applying (?:to|for)|application (?:for|to)|for|to)\s+(?:the\s+)?([A-Za-z][\w\/ ]{2,40}?)(?:\s+(?:at|with|position|role)\b|$)/i);
        if (rm) role = rm[1].trim();
        if (!company) { const cm = line.match(/\b([A-Z][a-zA-Z]+(?:\s[A-Z][a-zA-Z]+)?)\b/); company = cm ? cm[1] : line.slice(0, 24); }
        out.push({ company, role, status, applied: null });
      }
    }
    return out.filter((r) => r.company);
  }

        const id = b.dataset.clockin, name = b.dataset.name;

  Views.insights = {
    title: "Insights",
    render() {
      const d = S.get();
      const total = d.applications.length || 1;
      const counts = APP_STATUSES.reduce((m, s) => ((m[s] = d.applications.filter((a) => a.status === s).length), m), {});
      const offerRate = Math.round((counts.offer / total) * 100);
      const interviewRate = Math.round(((counts.interview + counts.offer) / total) * 100);

      // last 6 weeks of hours
      const weeks = [];
      for (let w = 5; w >= 0; w--) {
        const start = Date.now() - (w + 1) * 7 * 864e5;
        const end = Date.now() - w * 7 * 864e5;
        const ms = d.timeEntries
          .filter((e) => { const t = new Date(e.clockIn).getTime(); return t >= start && t < end; })
          .reduce((s, e) => s + (new Date(e.clockOut) - new Date(e.clockIn)), 0);
        weeks.push({ label: w === 0 ? "This wk" : w + "w ago", value: Math.round(ms / 36e5) });
      }

      const donut = [
        { label: "Applied", value: counts.applied, color: "var(--info)" },
        { label: "Interview", value: counts.interview, color: "var(--warn)" },
        { label: "Offer", value: counts.offer, color: "var(--success)" },
        { label: "Rejected", value: counts.rejected, color: "var(--danger)" },
      ];
      let acc = 0;
      const seg = donut.map((s) => { const start = acc / total * 360; acc += s.value; const end = acc / total * 360; return `${s.color} ${start}deg ${end}deg`; }).join(", ");

      // expense breakdown
      const expCats = {};
      d.transactions.filter((t) => t.type === "expense").forEach((t) => (expCats[t.category] = (expCats[t.category] || 0) + t.amount));
      const expData = Object.entries(expCats).map(([label, value]) => ({ label, value: Math.round(value) }));

      return `
      <div class="page-head"><div class="ph-text"><h1>Insights</h1><p>Analytics across your job search, time, and finances.</p></div></div>

      <div class="grid cols-4">
        ${stat({ label: "Offer rate", value: offerRate + "%", icon: "🎯", tone: "success" })}
        ${stat({ label: "Interview rate", value: interviewRate + "%", icon: "📈", tone: "primary" })}
        ${stat({ label: "Total applications", value: d.applications.length, icon: "💼", tone: "info" })}
        ${stat({ label: "Avg hrs / week", value: (weeks.reduce((s, w) => s + w.value, 0) / 6).toFixed(1), icon: "⏱", tone: "warn" })}
      </div>

      <div class="grid cols-2 mt-24">
        <div class="card">
          <div class="card-head"><h3>Hours logged — last 6 weeks</h3></div>
          <div class="card-pad">${barChart(weeks)}</div>
        </div>
        <div class="card">
          <div class="card-head"><h3>Application funnel</h3></div>
          <div class="card-pad flex gap-16 center" style="flex-wrap:wrap">
            <div style="width:150px;height:150px;border-radius:50%;background:conic-gradient(${seg});position:relative;flex-shrink:0">
              <div style="position:absolute;inset:24px;border-radius:50%;background:var(--surface);display:grid;place-items:center;text-align:center">
                <div><div style="font-size:22px;font-weight:800">${total}</div><div class="faint" style="font-size:11px">total</div></div>
              </div>
            </div>
            <div class="legend" style="flex:1;min-width:140px">
              ${donut.map((s) => `<div class="legend-item"><span class="legend-dot" style="background:${s.color}"></span>${s.label}<span style="margin-left:auto;font-weight:700">${s.value}</span></div>`).join("")}
            </div>
          </div>
        </div>
      </div>

      <div class="card mt-24">
        <div class="card-head"><h3>Expenses by category</h3></div>
        <div class="card-pad">${expData.length ? barChart(expData) : U.empty("💳", "No expenses recorded.")}</div>
      </div>`;
    },
    mount() {},
  };

  /* =========================================================
     5. JOB SEARCH
  ========================================================= */
  let jobQuery = "", jobType = "all", jobCategory = "all";
  let jobsLoading = false;
  const JOB_CATS = [
    { id: "all", label: "All roles" },
    { id: "sales", label: "SDR / BDR", tags: ["SDR", "BDR"] },
    { id: "coding", label: "Medical Coding", tags: ["Medical Coding"] },
  ];
  const jobInCat = (j) => {
    if (jobCategory === "all") return true;
    const cat = JOB_CATS.find((c) => c.id === jobCategory);
    return cat && (j.tags || []).some((t) => cat.tags.includes(t));
  };
  Views.jobsearch = {
    title: "Job Search",
    render() {
      const d = S.get();
      const live = d.liveJobs && d.liveJobs.length;
      const source = live ? d.liveJobs : d.jobMarket;
      const savedIds = new Set(d.savedJobs.map((j) => j.id));
      const q = jobQuery.toLowerCase();
      const catCount = (id) => source.filter((j) => { const c = JOB_CATS.find((x) => x.id === id); return id === "all" || (c && (j.tags || []).some((t) => c.tags.includes(t))); }).length;
      const list = source.filter((j) =>
        jobInCat(j) &&
        (jobType === "all" || j.type === jobType) &&
        (!q || (j.role + j.company + j.location + (j.tags || []).join(" ")).toLowerCase().includes(q)));

      return `
      <div class="page-head">
        <div class="ph-text"><h1>Job Search</h1><p>Remote SDR / BDR and medical coding roles${live ? ", live from Adzuna" : ""}. Save any role straight into your applications.</p></div>
        <div class="ph-actions"><button class="btn primary" id="refreshJobs">${jobsLoading ? "Searching…" : "⟳ Refresh from Adzuna"}</button></div>
      </div>

      <div class="card card-pad">
        <div class="flex gap-8" style="flex-wrap:wrap;margin-bottom:14px">
          ${JOB_CATS.map((c) => `<button class="chip" data-cat="${c.id}" style="${jobCategory === c.id ? "background:var(--primary);color:#04121c;border-color:var(--primary);font-weight:700" : "cursor:pointer"}">${c.label} · ${catCount(c.id)}</button>`).join("")}
        </div>
        <div class="flex gap-12 center" style="flex-wrap:wrap">
          <input class="search-input" id="jobSearch" placeholder="🔍 Filter role, company, location…" value="${U.esc(jobQuery)}"/>
          <select class="field" id="jobType" style="padding:10px 12px;border:1px solid var(--border);border-radius:10px;background:var(--surface);color:var(--text)">
            ${["all", "Full-time", "Contract", "Part-time"].map((t) => `<option value="${t}" ${jobType === t ? "selected" : ""}>${t === "all" ? "All types" : t}</option>`).join("")}
          </select>
          <span class="chip">${list.length} results</span>
        </div>
        <div class="faint mt-8" id="jobStatus" style="font-size:12px">
          ${live
            ? `🟢 Live · ${d.liveJobs.length} remote SDR/BDR roles · updated ${U.ago(d.liveJobsFetched)}`
            : "Showing sample roles. Click Refresh to pull live jobs (needs Adzuna keys on your Vercel site)."}
        </div>
      </div>

      <div class="grid cols-2 mt-24">
        ${list.length ? list.map((j) => `
          <div class="card card-pad">
            <div class="flex between center">
              <div class="flex gap-12 center">
                <div class="avatar" style="border-radius:11px">${U.esc((j.company || "?")[0])}</div>
                <div><div class="row-main" style="font-size:15px">${U.esc(j.role)}</div><div class="row-sub">${U.esc(j.company)} · ${U.esc(j.location)}</div></div>
              </div>
              ${j.posted && new Date(j.posted).toDateString() === new Date().toDateString() ? `<span class="badge b-offer">New</span>` : ""}
            </div>
            <div class="flex gap-8 mt-16" style="flex-wrap:wrap">
              <span class="chip">${U.esc(j.type)}</span>
              <span class="chip">💰 ${U.esc(j.salary)}</span>
              ${(j.tags || []).map((t) => `<span class="chip">${U.esc(t)}</span>`).join("")}
            </div>
            <div class="flex between center mt-16">
              <span class="faint" style="font-size:12px">Posted ${U.ago(j.posted)}</span>
              <div class="flex gap-8">
                ${j.applyUrl ? `<a class="btn sm" href="${U.esc(j.applyUrl)}" target="_blank" rel="noopener">Apply ↗</a>` : ""}
                <button class="btn ${savedIds.has(j.id) ? "" : "primary"} sm" data-save="${j.id}" ${savedIds.has(j.id) ? "disabled" : ""}>
                  ${savedIds.has(j.id) ? "✓ Saved" : "＋ Save"}
                </button>
              </div>
            </div>
          </div>`).join("")
          : `<div style="grid-column:1/-1">${U.empty("🔍", "No jobs match your filter.")}</div>`}
      </div>`;
    },
    mount(root) {
      const search = root.querySelector("#jobSearch");
      let t;
      search.oninput = () => { clearTimeout(t); t = setTimeout(() => { jobQuery = search.value; window.App.rerender(); const s = document.getElementById("jobSearch"); if (s) { s.focus(); s.setSelectionRange(s.value.length, s.value.length); } }, 220); };
      root.querySelector("#jobType").onchange = (e) => { jobType = e.target.value; window.App.rerender(); };
      root.querySelectorAll("[data-cat]").forEach((b) => (b.onclick = () => { jobCategory = b.dataset.cat; window.App.rerender(); }));

      const fetchLiveJobs = async (force) => {
        const d = S.get();
        const fresh = d.liveJobsFetched && (Date.now() - new Date(d.liveJobsFetched) < 24 * 36e5);
        if (!force && fresh && d.liveJobs.length) return;
        if (jobsLoading) return;
        jobsLoading = true;
        const note = document.getElementById("jobStatus");
        if (note) note.textContent = "Searching Adzuna for remote SDR/BDR roles…";
        try {
          const r = await fetch("/api/jobs?country=us");
          if (!r.ok) throw new Error(r.status === 404 ? "not-deployed" : "HTTP " + r.status);
          const data = await r.json();
          if (data.error) throw new Error(data.error);
          jobsLoading = false;
          S.setLiveJobs(data.jobs || []);
          U.toast(`Found ${data.count} remote SDR/BDR roles`, "success");
          window.App.rerender();
        } catch (e) {
          jobsLoading = false;
          const n = document.getElementById("jobStatus");
          if (n) n.textContent = e.message === "not-deployed"
            ? "Live search runs on your Vercel site — open the dashboard-noah25.vercel.app URL (the /api endpoint isn't on github.io)."
            : "Couldn't load live jobs: " + e.message;
        }
      };

      root.querySelector("#refreshJobs").onclick = () => fetchLiveJobs(true);

      root.querySelectorAll("[data-save]").forEach((b) => (b.onclick = () => {
        const id = b.dataset.save;
        const job = [...S.get().liveJobs, ...S.get().jobMarket].find((j) => String(j.id) === String(id));
        if (!job) return;
        S.get().savedJobs.push({ id: job.id });
        S.save();
        S.add("applications", {
          company: job.company, role: job.role, status: "applied", location: job.location,
          salary: job.salary, source: "Job Search", applied: new Date().toISOString(),
          notes: "Saved from Job Search" + (job.applyUrl ? "\n" + job.applyUrl : ""), interviewDate: null,
        });
        U.toast("Saved to Job Applications", "success");
        window.App.rerender();
      }));

      // auto-refresh once a day when the page is opened
      fetchLiveJobs(false);
    },
  };

  function accountDBMount(root) {
    const p = window.DB.target();
    const inp = root.querySelector("#avatarInput");
    const pick = () => inp.click();
    const box = root.querySelector("#avatarBox");
    if (box) box.onclick = pick;
    const cp = root.querySelector("#changePhoto");
    if (cp) cp.onclick = pick;
    if (inp) inp.onchange = (e) => {
      const f = e.target.files[0]; if (!f) return;
      const rd = new FileReader();
      rd.onload = () => {
        const img = new Image();
        img.onload = async () => {
          const max = 256, sc = Math.min(1, max / Math.max(img.width, img.height));
          const cw = Math.round(img.width * sc), ch = Math.round(img.height * sc);
          const cv = document.createElement("canvas"); cv.width = cw; cv.height = ch;
          cv.getContext("2d").drawImage(img, 0, 0, cw, ch);
          const url = cv.toDataURL("image/jpeg", 0.85);
          await window.DB.updateProfile(p.id, { avatar_url: url });
          if (window.Auth) await window.Auth.reloadProfile();
          U.toast("Photo updated", "success");
          window.App.refreshSidebarUser();
          window.App.rerender();
        };
        img.src = rd.result;
      };
      rd.readAsDataURL(f);
    };
    root.querySelector("#profileFormDB").onsubmit = async (e) => {
      e.preventDefault();
      const f = e.target;
      const patch = { full_name: f.full_name.value.trim(), title: f.title.value.trim(), phone: f.phone.value.trim(), location: f.location.value.trim(), dept: f.dept.value.trim(), id_number: f.id_number.value.trim(), address: f.address.value.trim() };
      if (f.role) patch.role = f.role.value;
      if (f.status) patch.status = f.status.value;
      await window.DB.updateProfile(p.id, patch);
      if (window.Auth) await window.Auth.reloadProfile();
      U.toast("Profile saved", "success");
      window.App.refreshSidebarUser();
      window.App.rerender();
    };
    bindGmailCard(root);

  const KNOWN_DOCS = {
    "onboarding-checklist.pdf": "assets/docs/onboarding-checklist.pdf",
    "expense-policy.pdf": "assets/docs/expense-policy.pdf",
    "brand-guide.pdf": "assets/docs/brand-guide.pdf",
  };
  const docSrc = (s) => (s && (s.dataUrl || s.url || KNOWN_DOCS[(s.fileName || "").toLowerCase()])) || "";
  let sopSelected = null;
  Views.sops = {
    title: "SOPs",
    render() {
      const d = S.get();
      const docs = d.sops;
      return `
      <div class="page-head">
        <div class="ph-text"><h1>SOPs & Documents</h1><p>Upload and host your standard operating procedures. Click a document to open it.</p></div>
        <div class="ph-actions"><button class="btn primary" id="uploadDoc">⬆ Upload document</button></div>
      </div>

      <div class="dropzone" id="dropzone">
        <div class="dz-ico">📁</div>
        <div><strong>Drag & drop files here</strong> or click to browse</div>
        <div class="faint" style="font-size:12px;margin-top:4px">PDFs open in a viewer · stored locally in this workspace</div>
        <input type="file" id="fileInput" multiple style="display:none"/>
      </div>

      <div class="card mt-24">
        <div class="card-head"><h3>Document library</h3><div class="ch-actions"><span class="chip">${docs.length} files</span></div></div>
        <div class="table-wrap">
          <table class="tbl">
            <thead><tr><th>Document</th><th>Category</th><th>Version</th><th>Size</th><th>Uploaded by</th><th>Date</th><th></th></tr></thead>
            <tbody>
              ${docs.length ? docs.map((s) => `
                <tr ${docSrc(s) ? `data-open="${s.id}" style="cursor:pointer"` : ""}>
                  <td><div class="flex gap-12 center"><div class="li-ico bg-info">${fileIcon(s.fileName)}</div>
                    <div><div class="row-main">${U.esc(s.title)}</div><div class="row-sub">${U.esc(s.fileName)}</div></div></div></td>
                  <td><span class="chip">${U.esc(s.category)}</span></td>
                  <td class="muted">${U.esc(s.version)}</td>
                  <td class="muted nowrap">${U.fileSize(s.size)}</td>
                  <td class="muted">${U.esc(s.uploadedBy)}</td>
                  <td class="muted nowrap">${U.dateShort(s.uploaded)}</td>
                  <td>
                    <div class="flex gap-8 nowrap">
                      ${docSrc(s) ? `<button class="btn sm" data-view="${s.id}">Open</button>` : ""}
                      <button class="btn sm ghost" data-act="edit" data-id="${s.id}">Edit</button>
                      <button class="btn sm ghost" data-act="del" data-id="${s.id}" style="color:var(--danger)">Delete</button>
                    </div>
                  </td>
                </tr>`).join("")
                : `<tr><td colspan="7">${U.empty("📄", "No documents yet. Upload your first SOP.")}</td></tr>`}
            </tbody>
          </table>
        </div>
      </div>`;
    },
    mount(root) {
      const fileInput = root.querySelector("#fileInput");
      const dz = root.querySelector("#dropzone");
      const addFiles = (files) => {
        const arr = [...files]; if (!arr.length) return;
        const LIMIT = 3 * 1024 * 1024; // ~3MB browser-storage cap for inline viewing
        let pending = arr.length, firstRec = null, tooBig = 0;
        arr.forEach((f) => {
          const base = {
            title: f.name.replace(/\.[^.]+$/, "").replace(/[-_]/g, " ").replace(/\b\w/g, (c) => c.toUpperCase()),
            category: "Uncategorized", version: "v1.0", fileName: f.name, size: f.size,
            uploadedBy: S.get().profile.name, uploaded: new Date().toISOString(),
          };
          const finish = (extra) => {
            const rec = S.add("sops", { ...base, ...extra });
            if (!firstRec) firstRec = rec;
            if (--pending === 0) {
              U.toast(arr.length + " file(s) uploaded" + (tooBig ? ` · ${tooBig} too large to preview` : ""), tooBig ? "" : "success");
              window.App.rerender();
              if (firstRec && docSrc(firstRec)) openViewer(firstRec); // auto-open the uploaded doc
            }
          };
          if (f.size < LIMIT) {
            const r = new FileReader();
            r.onload = () => finish({ dataUrl: r.result });
            r.onerror = () => finish({});
            r.readAsDataURL(f);
          } else { tooBig++; finish({}); }
        });
      };
      dz.onclick = () => fileInput.click();
      fileInput.onchange = (e) => addFiles(e.target.files);
      dz.ondragover = (e) => { e.preventDefault(); dz.classList.add("drag"); };
      dz.ondragleave = () => dz.classList.remove("drag");
      dz.ondrop = (e) => { e.preventDefault(); dz.classList.remove("drag"); addFiles(e.dataTransfer.files); };

      function openViewer(s) {
        if (!s) return;
        const src = docSrc(s);
        const ext = (s.fileName || "").split(".").pop().toLowerCase();
        const isPdf = ext === "pdf" && src;
        const isImg = ["png", "jpg", "jpeg", "gif", "webp", "svg"].includes(ext) && src;
        let body;
        if (isPdf) body = `<iframe src="${U.esc(src)}#view=FitH" title="${U.esc(s.title)}" style="width:100%;height:72vh;border:1px solid var(--border);border-radius:8px;background:#fff"></iframe>`;
        else if (isImg) body = `<div style="text-align:center"><img src="${U.esc(src)}" alt="${U.esc(s.title)}" style="max-width:100%;max-height:72vh;border-radius:8px"/></div>`;
        else body = `<div class="empty"><div class="em-ico">${fileIcon(s.fileName)}</div><p>This is a ${ext ? U.esc(ext.toUpperCase()) + " " : ""}file — browsers can't preview it inline.${src ? " Use the button below to download / open it." : " Re-upload the file to view it here."}</p></div>`;
        U.modal({
          title: s.title,
          body,
          footer: `${src ? `<a class="btn" href="${U.esc(src)}" ${isPdf || isImg ? 'target="_blank" rel="noopener"' : `download="${U.esc(s.fileName || "document")}"`}>↗ ${isPdf || isImg ? "Open in new tab" : "Download"}</a>` : ""}<button class="btn primary" data-modal-close>Close</button>`,
          onMount: (card) => { if (isPdf || isImg) card.style.width = "min(980px, calc(100vw - 32px))"; },
        });
      }
      root.querySelectorAll("[data-view]").forEach((b) => (b.onclick = (e) => { e.stopPropagation(); openViewer(S.find("sops", b.dataset.view)); }));
      root.querySelectorAll("[data-open]").forEach((tr) => (tr.onclick = (e) => {
        if (e.target.closest("[data-act]") || e.target.closest("[data-view]")) return;
        openViewer(S.find("sops", tr.dataset.open));
      }));
      root.querySelector("#uploadDoc").onclick = () => openDocForm(null);
      root.querySelectorAll('[data-act="edit"]').forEach((b) => (b.onclick = () => openDocForm(S.find("sops", b.dataset.id))));
      root.querySelectorAll('[data-act="del"]').forEach((b) => (b.onclick = () =>
        U.confirm("Delete this document?", () => { S.remove("sops", b.dataset.id); U.toast("Deleted"); window.App.rerender(); })));

      function openDocForm(doc) {
        U.formModal({
          title: doc ? "Edit document" : "Add document",
          submitLabel: doc ? "Save" : "Add",
          values: doc || {},
          fields: [
            { name: "title", label: "Title", required: true },
            { name: "category", label: "Category", type: "select", options: ["Operations", "HR", "Finance", "Marketing", "Legal", "Uncategorized"].map((c) => ({ value: c, label: c })), half: true },
            { name: "version", label: "Version", placeholder: "v1.0", half: true },
            { name: "fileName", label: "File name", placeholder: "document.pdf", required: true },
          ],
          onSubmit: (data) => {
            if (doc) { S.update("sops", doc.id, data); U.toast("Updated", "success"); }
            else { S.add("sops", { ...data, size: 102400, uploadedBy: S.get().profile.name, uploaded: new Date().toISOString() }); U.toast("Added", "success"); }
            window.App.rerender();
          },
        });
      }
    },
  };
  const fileIcon = (name = "") => {
    const e = name.split(".").pop().toLowerCase();
    if (["pdf"].includes(e)) return "📕";
    if (["doc", "docx"].includes(e)) return "📘";
    if (["xls", "xlsx", "csv"].includes(e)) return "📗";
    if (["png", "jpg", "jpeg", "gif"].includes(e)) return "🖼";
    return "📄";
  };
