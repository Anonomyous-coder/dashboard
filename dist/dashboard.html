<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Workspace Dashboard</title>
    <style>
/* ============ Design tokens ============ */
:root {
  --bg: #f4f6fb;
  --surface: #ffffff;
  --surface-2: #f7f9fc;
  --border: #e6e9f0;
  --text: #1c2430;
  --text-soft: #5a6675;
  --text-faint: #8a94a3;
  --primary: #4f6ef7;
  --primary-soft: #eaefff;
  --success: #1fa971;
  --success-soft: #e3f6ee;
  --warn: #e0911a;
  --warn-soft: #fcf1dc;
  --danger: #e2533b;
  --danger-soft: #fce5e0;
  --info: #2f8fd6;
  --info-soft: #e3f1fb;
  --sidebar-bg: #141a2a;
  --sidebar-text: #aeb7c9;
  --sidebar-active: #4f6ef7;
  --shadow: 0 1px 2px rgba(20, 26, 42, .06), 0 6px 20px rgba(20, 26, 42, .06);
  --radius: 14px;
  --radius-sm: 10px;
}
[data-theme="dark"] {
  --bg: #0e1320;
  --surface: #161d2e;
  --surface-2: #1b2436;
  --border: #27314a;
  --text: #e7ecf5;
  --text-soft: #a4afc2;
  --text-faint: #74809a;
  --primary: #6f8bff;
  --primary-soft: #1e2a4d;
  --success-soft: #11321f;
  --warn-soft: #36280f;
  --danger-soft: #3a1f18;
  --info-soft: #102536;
  --sidebar-bg: #0b1018;
  --shadow: 0 1px 2px rgba(0,0,0,.4), 0 8px 24px rgba(0,0,0,.35);
}

* { box-sizing: border-box; margin: 0; padding: 0; }
html, body { height: 100%; }
body {
  font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
  background: var(--bg);
  color: var(--text);
  -webkit-font-smoothing: antialiased;
}
button, input, select, textarea { font-family: inherit; font-size: inherit; }
a { color: inherit; text-decoration: none; }

#app { display: grid; grid-template-columns: 256px 1fr; min-height: 100vh; }

/* ============ Sidebar ============ */
.sidebar {
  background: var(--sidebar-bg);
  color: var(--sidebar-text);
  display: flex;
  flex-direction: column;
  padding: 18px 14px;
  position: sticky;
  top: 0;
  height: 100vh;
  z-index: 40;
}
.brand { display: flex; align-items: center; gap: 12px; padding: 6px 8px 18px; }
.brand-mark {
  width: 38px; height: 38px; border-radius: 11px;
  background: linear-gradient(135deg, #4f6ef7, #8a5cf6);
  display: grid; place-items: center; color: #fff; font-size: 18px;
}
.brand-text { display: flex; flex-direction: column; line-height: 1.1; }
.brand-name { color: #fff; font-weight: 700; font-size: 15px; }
.brand-sub { font-size: 11px; color: #6f7b91; letter-spacing: .08em; text-transform: uppercase; }

.nav { flex: 1; overflow-y: auto; display: flex; flex-direction: column; gap: 2px; }
.nav-group-label {
  font-size: 11px; text-transform: uppercase; letter-spacing: .1em;
  color: #5d6880; padding: 16px 12px 6px;
}
.nav-item {
  display: flex; align-items: center; gap: 11px;
  padding: 9px 12px; border-radius: var(--radius-sm);
  color: var(--sidebar-text); cursor: pointer; font-size: 14px; font-weight: 500;
  transition: background .14s, color .14s; border: none; background: none; width: 100%; text-align: left;
}
.nav-item:hover { background: rgba(255,255,255,.05); color: #fff; }
.nav-item.active { background: var(--sidebar-active); color: #fff; }
.nav-item .ni-icon { width: 20px; text-align: center; font-size: 15px; opacity: .9; }
.nav-item .ni-badge {
  margin-left: auto; background: rgba(255,255,255,.14); color: #fff;
  font-size: 11px; padding: 1px 7px; border-radius: 20px; font-weight: 600;
}
.nav-item.active .ni-badge { background: rgba(255,255,255,.25); }

.sidebar-footer { border-top: 1px solid rgba(255,255,255,.07); padding-top: 12px; margin-top: 8px; }
.user-chip { display: flex; align-items: center; gap: 10px; padding: 6px 8px; border-radius: var(--radius-sm); cursor: pointer; }
.user-chip:hover { background: rgba(255,255,255,.05); }
.avatar {
  width: 36px; height: 36px; border-radius: 50%; flex-shrink: 0;
  background: linear-gradient(135deg, #4f6ef7, #8a5cf6); color: #fff;
  display: grid; place-items: center; font-weight: 700; font-size: 14px;
}
.user-meta { display: flex; flex-direction: column; line-height: 1.2; overflow: hidden; }
.user-name { color: #fff; font-weight: 600; font-size: 13px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.user-role { font-size: 11px; color: #6f7b91; }

/* ============ Main ============ */
.main { display: flex; flex-direction: column; min-width: 0; }
.topbar {
  position: sticky; top: 0; z-index: 30;
  display: flex; align-items: center; gap: 14px;
  background: color-mix(in srgb, var(--bg) 80%, transparent);
  backdrop-filter: blur(8px);
  padding: 14px 28px; border-bottom: 1px solid var(--border);
}
.page-title { font-size: 19px; font-weight: 700; }
.topbar-actions { margin-left: auto; display: flex; align-items: center; gap: 12px; }
.icon-btn {
  width: 38px; height: 38px; border-radius: 10px; border: 1px solid var(--border);
  background: var(--surface); color: var(--text); cursor: pointer; font-size: 16px;
  display: grid; place-items: center; transition: background .14s;
}
.icon-btn:hover { background: var(--surface-2); }
.menu-toggle { display: none; }

.clock-pill {
  display: flex; align-items: center; gap: 8px;
  padding: 8px 14px; border-radius: 30px; font-size: 13px; font-weight: 600;
  background: var(--surface); border: 1px solid var(--border); color: var(--text-soft);
}
.clock-pill .dot { width: 9px; height: 9px; border-radius: 50%; background: var(--text-faint); }
.clock-pill.on { color: var(--success); border-color: var(--success); background: var(--success-soft); }
.clock-pill.on .dot { background: var(--success); animation: pulse 1.4s infinite; }
@keyframes pulse { 0%,100% { opacity: 1; } 50% { opacity: .35; } }

.content { padding: 28px; max-width: 1280px; width: 100%; }

/* ============ Generic UI ============ */
.page-head { display: flex; align-items: flex-start; gap: 16px; margin-bottom: 22px; flex-wrap: wrap; }
.page-head .ph-text h1 { font-size: 22px; font-weight: 700; }
.page-head .ph-text p { color: var(--text-soft); font-size: 14px; margin-top: 4px; }
.page-head .ph-actions { margin-left: auto; display: flex; gap: 10px; flex-wrap: wrap; }

.btn {
  display: inline-flex; align-items: center; gap: 8px;
  padding: 9px 16px; border-radius: var(--radius-sm); border: 1px solid var(--border);
  background: var(--surface); color: var(--text); font-weight: 600; font-size: 13.5px;
  cursor: pointer; transition: filter .14s, background .14s, transform .05s;
}
.btn:hover { background: var(--surface-2); }
.btn:active { transform: translateY(1px); }
.btn.primary { background: var(--primary); border-color: var(--primary); color: #fff; }
.btn.primary:hover { filter: brightness(1.06); background: var(--primary); }
.btn.danger { background: var(--danger); border-color: var(--danger); color: #fff; }
.btn.ghost { background: transparent; border-color: transparent; }
.btn.ghost:hover { background: var(--surface-2); }
.btn.sm { padding: 6px 11px; font-size: 12.5px; }

.card {
  background: var(--surface); border: 1px solid var(--border);
  border-radius: var(--radius); box-shadow: var(--shadow);
}
.card-pad { padding: 20px; }
.card-head { display: flex; align-items: center; gap: 10px; padding: 16px 20px; border-bottom: 1px solid var(--border); }
.card-head h3 { font-size: 15px; font-weight: 700; }
.card-head .ch-actions { margin-left: auto; display: flex; gap: 8px; }

.grid { display: grid; gap: 18px; }
.cols-4 { grid-template-columns: repeat(4, 1fr); }
.cols-3 { grid-template-columns: repeat(3, 1fr); }
.cols-2 { grid-template-columns: repeat(2, 1fr); }
@media (max-width: 1100px) { .cols-4 { grid-template-columns: repeat(2, 1fr); } .cols-3 { grid-template-columns: repeat(2,1fr);} }
@media (max-width: 720px) { .cols-4, .cols-3, .cols-2 { grid-template-columns: 1fr; } }

/* Stat cards */
.stat {
  background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius);
  padding: 18px 20px; box-shadow: var(--shadow); display: flex; flex-direction: column; gap: 10px;
}
.stat .stat-top { display: flex; align-items: center; justify-content: space-between; }
.stat .stat-ico { width: 40px; height: 40px; border-radius: 11px; display: grid; place-items: center; font-size: 18px; }
.stat .stat-label { color: var(--text-soft); font-size: 13px; font-weight: 500; }
.stat .stat-value { font-size: 28px; font-weight: 800; letter-spacing: -.02em; }
.stat .stat-trend { font-size: 12.5px; font-weight: 600; }
.trend-up { color: var(--success); }
.trend-down { color: var(--danger); }

.bg-primary { background: var(--primary-soft); color: var(--primary); }
.bg-success { background: var(--success-soft); color: var(--success); }
.bg-warn { background: var(--warn-soft); color: var(--warn); }
.bg-danger { background: var(--danger-soft); color: var(--danger); }
.bg-info { background: var(--info-soft); color: var(--info); }

/* Tables */
.table-wrap { width: 100%; overflow-x: auto; }
table.tbl { width: 100%; border-collapse: collapse; font-size: 13.5px; }
table.tbl th {
  text-align: left; padding: 12px 16px; color: var(--text-faint);
  font-weight: 600; font-size: 11.5px; text-transform: uppercase; letter-spacing: .05em;
  border-bottom: 1px solid var(--border);
}
table.tbl td { padding: 13px 16px; border-bottom: 1px solid var(--border); vertical-align: middle; }
table.tbl tr:last-child td { border-bottom: none; }
table.tbl tbody tr { transition: background .12s; }
table.tbl tbody tr:hover { background: var(--surface-2); }
.row-main { font-weight: 600; }
.row-sub { color: var(--text-faint); font-size: 12px; }

/* Badges */
.badge {
  display: inline-flex; align-items: center; gap: 5px;
  padding: 3px 10px; border-radius: 30px; font-size: 12px; font-weight: 600; white-space: nowrap;
}
.badge::before { content: ""; width: 6px; height: 6px; border-radius: 50%; background: currentColor; }
.b-applied { background: var(--info-soft); color: var(--info); }
.b-interview { background: var(--warn-soft); color: var(--warn); }
.b-offer { background: var(--success-soft); color: var(--success); }
.b-rejected { background: var(--danger-soft); color: var(--danger); }
.b-draft, .b-pending { background: var(--warn-soft); color: var(--warn); }
.b-sent { background: var(--info-soft); color: var(--info); }
.b-signed, .b-active, .b-paid, .b-approved, .b-hired { background: var(--success-soft); color: var(--success); }
.b-declined, .b-expired, .b-overdue { background: var(--danger-soft); color: var(--danger); }
.b-screening, .b-review { background: var(--primary-soft); color: var(--primary); }

/* Empty state */
.empty { text-align: center; padding: 48px 20px; color: var(--text-faint); }
.empty .em-ico { font-size: 40px; opacity: .5; margin-bottom: 12px; }
.empty p { font-size: 14px; margin-bottom: 16px; }

/* Forms */
.field { display: flex; flex-direction: column; gap: 6px; margin-bottom: 14px; }
.field label { font-size: 13px; font-weight: 600; color: var(--text-soft); }
.field input, .field select, .field textarea {
  padding: 10px 12px; border: 1px solid var(--border); border-radius: var(--radius-sm);
  background: var(--surface); color: var(--text); outline: none; transition: border .14s, box-shadow .14s;
}
.field input:focus, .field select:focus, .field textarea:focus {
  border-color: var(--primary); box-shadow: 0 0 0 3px var(--primary-soft);
}
.field textarea { resize: vertical; min-height: 84px; }
.field-row { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; }
@media (max-width: 540px) { .field-row { grid-template-columns: 1fr; } }

/* Modal */
.modal-host { position: fixed; inset: 0; z-index: 100; display: none; }
.modal-host.open { display: grid; place-items: center; }
.modal-backdrop { position: absolute; inset: 0; background: rgba(15,20,35,.5); backdrop-filter: blur(2px); }
.modal-card {
  position: relative; background: var(--surface); border-radius: var(--radius);
  width: min(560px, calc(100vw - 32px)); max-height: calc(100vh - 48px); overflow-y: auto;
  box-shadow: 0 20px 60px rgba(0,0,0,.3); border: 1px solid var(--border);
}
.modal-card .m-head { display: flex; align-items: center; padding: 18px 22px; border-bottom: 1px solid var(--border); }
.modal-card .m-head h3 { font-size: 17px; font-weight: 700; }
.modal-card .m-body { padding: 20px 22px; }
.modal-card .m-foot { padding: 16px 22px; border-top: 1px solid var(--border); display: flex; justify-content: flex-end; gap: 10px; }

/* Toast */
.toast-host { position: fixed; bottom: 24px; right: 24px; z-index: 200; display: flex; flex-direction: column; gap: 10px; }
.toast {
  background: var(--text); color: var(--surface); padding: 12px 18px; border-radius: var(--radius-sm);
  font-size: 13.5px; font-weight: 500; box-shadow: var(--shadow); animation: toastIn .25s ease;
  display: flex; align-items: center; gap: 9px; max-width: 340px;
}
.toast.success { background: var(--success); color: #fff; }
.toast.error { background: var(--danger); color: #fff; }
@keyframes toastIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: none; } }

.scrim { display: none; }

/* Misc layout helpers */
.list { display: flex; flex-direction: column; }
.list-item { display: flex; align-items: center; gap: 12px; padding: 13px 0; border-bottom: 1px solid var(--border); }
.list-item:last-child { border-bottom: none; }
.li-ico { width: 36px; height: 36px; border-radius: 10px; display: grid; place-items: center; flex-shrink: 0; font-size: 15px; }
.li-text { flex: 1; min-width: 0; }
.li-title { font-weight: 600; font-size: 13.5px; }
.li-sub { color: var(--text-faint); font-size: 12px; }
.li-time { color: var(--text-faint); font-size: 12px; white-space: nowrap; }

.flex { display: flex; }
.between { justify-content: space-between; }
.center { align-items: center; }
.gap-8 { gap: 8px; } .gap-12 { gap: 12px; } .gap-16 { gap: 16px; }
.mt-8 { margin-top: 8px; } .mt-16 { margin-top: 16px; } .mt-24 { margin-top: 24px; }
.muted { color: var(--text-soft); }
.faint { color: var(--text-faint); }
.right { text-align: right; }
.nowrap { white-space: nowrap; }
.chip {
  display: inline-flex; align-items: center; gap: 6px; padding: 4px 10px; border-radius: 20px;
  background: var(--surface-2); border: 1px solid var(--border); font-size: 12px; color: var(--text-soft); font-weight: 500;
}
.search-input {
  flex: 1; padding: 10px 14px; border: 1px solid var(--border); border-radius: var(--radius-sm);
  background: var(--surface); color: var(--text); outline: none; min-width: 180px;
}
.search-input:focus { border-color: var(--primary); box-shadow: 0 0 0 3px var(--primary-soft); }

/* Big timer */
.timer-display { font-size: 52px; font-weight: 800; letter-spacing: .02em; font-variant-numeric: tabular-nums; }

/* Progress bar */
.bar { height: 8px; border-radius: 8px; background: var(--surface-2); overflow: hidden; }
.bar > span { display: block; height: 100%; border-radius: 8px; background: var(--primary); }

/* Simple bar chart */
.chart { display: flex; align-items: flex-end; gap: 12px; height: 180px; padding-top: 10px; }
.chart .bar-col { flex: 1; display: flex; flex-direction: column; align-items: center; gap: 8px; height: 100%; justify-content: flex-end; }
.chart .bar-col .col-fill { width: 100%; max-width: 42px; border-radius: 8px 8px 0 0; background: linear-gradient(180deg, var(--primary), #8a5cf6); min-height: 4px; transition: height .4s; }
.chart .bar-col .col-label { font-size: 11.5px; color: var(--text-faint); font-weight: 600; }
.chart .bar-col .col-val { font-size: 12px; font-weight: 700; }

/* Donut legend */
.legend { display: flex; flex-direction: column; gap: 10px; }
.legend-item { display: flex; align-items: center; gap: 10px; font-size: 13px; }
.legend-dot { width: 11px; height: 11px; border-radius: 3px; }

/* File drop */
.dropzone {
  border: 2px dashed var(--border); border-radius: var(--radius); padding: 32px; text-align: center;
  color: var(--text-faint); cursor: pointer; transition: border .14s, background .14s; background: var(--surface-2);
}
.dropzone:hover, .dropzone.drag { border-color: var(--primary); background: var(--primary-soft); color: var(--primary); }
.dropzone .dz-ico { font-size: 32px; margin-bottom: 8px; }

/* Responsive sidebar */
@media (max-width: 900px) {
  #app { grid-template-columns: 1fr; }
  .sidebar {
    position: fixed; left: 0; top: 0; bottom: 0; width: 256px; transform: translateX(-100%);
    transition: transform .22s ease;
  }
  .sidebar.open { transform: none; }
  .menu-toggle { display: grid; }
  .content { padding: 18px; }
  .topbar { padding: 12px 16px; }
  .scrim.show { display: block; position: fixed; inset: 0; background: rgba(0,0,0,.4); z-index: 35; }
}

</style>
</head>
<body>
  <div id="app">
    <!-- Sidebar -->
    <aside class="sidebar" id="sidebar">
      <div class="brand">
        <div class="brand-mark">◆</div>
        <div class="brand-text">
          <span class="brand-name">Workspace</span>
          <span class="brand-sub">Dashboard</span>
        </div>
      </div>

      <nav class="nav" id="nav"><!-- nav rendered by app.js --></nav>

      <div class="sidebar-footer">
        <div class="user-chip" data-route="account">
          <div class="avatar" id="sidebarAvatar">?</div>
          <div class="user-meta">
            <span class="user-name" id="sidebarName">Your Name</span>
            <span class="user-role" id="sidebarRole">Member</span>
          </div>
        </div>
      </div>
    </aside>

    <!-- Main -->
    <main class="main">
      <header class="topbar">
        <button class="icon-btn menu-toggle" id="menuToggle" aria-label="Toggle menu">☰</button>
        <div class="page-title" id="pageTitle">My Dashboard</div>
        <div class="topbar-actions">
          <div class="clock-pill" id="clockPill">
            <span class="dot"></span>
            <span id="clockPillText">Clocked out</span>
          </div>
          <button class="icon-btn" id="themeToggle" title="Toggle theme">◐</button>
        </div>
      </header>

      <section class="content" id="content"><!-- view rendered by app.js --></section>
    </main>

    <div class="scrim" id="scrim"></div>
  </div>

  <!-- Modal host -->
  <div class="modal-host" id="modalHost" aria-hidden="true">
    <div class="modal-backdrop" id="modalBackdrop"></div>
    <div class="modal-card" id="modalCard" role="dialog" aria-modal="true"></div>
  </div>

  <div class="toast-host" id="toastHost"></div>
  <script>

        { id: uid(), company: "Figma", role: "Senior Ops Analyst", status: "rejected", location: "New York, NY", salary: "$125k", source: "LinkedIn", applied: daysAgo(40), notes: "", interviewDate: null },
      ],

    try {
      const raw = localStorage.getItem(KEY);
      if (raw) return JSON.parse(raw);
    } catch (e) { /* ignore */ }
    const s = seed();
    persist(s);
    return s;
  }
  function persist(s) {
    try { localStorage.setItem(KEY, JSON.stringify(s || state)); } catch (e) {}
  }

  const Store = {
    uid,
    get: () => state,
    save: () => persist(state),
    reset() { state = seed(); persist(state); },

    // Generic collection helpers
    add(coll, item) {
      item.id = item.id || uid();
      state[coll].unshift(item);
      persist(state);
      return item;
    },
    update(coll, id, patch) {
      const list = state[coll];
      const i = list.findIndex((x) => x.id === id);
      if (i > -1) { list[i] = { ...list[i], ...patch }; persist(state); return list[i]; }
      return null;
    },
    remove(coll, id) {
      state[coll] = state[coll].filter((x) => x.id !== id);
      persist(state);
    },
    find(coll, id) { return (state[coll] || []).find((x) => x.id === id); },

    setProfile(patch) { state.profile = { ...state.profile, ...patch }; persist(state); },

    // Time clock
    clockIn(project, note) {
      state.activeClock = { project: project || "General", note: note || "", clockIn: new Date().toISOString() };
      persist(state);
    },
    clockOut() {
      if (!state.activeClock) return null;
      const entry = {
        id: uid(),
        project: state.activeClock.project,
        note: state.activeClock.note,
        clockIn: state.activeClock.clockIn,
        clockOut: new Date().toISOString(),
      };
      state.timeEntries.unshift(entry);
      state.activeClock = null;
      persist(state);
      return entry;
    },
  };

  window.Store = Store;
})();

/* ============================================================
   UI — shared helpers: format, modal, toast, dom
   ============================================================ */
(function () {
  const UI = {};

  // ---- escaping & dom ----
  UI.esc = (s) =>
    String(s ?? "").replace(/[&<>"']/g, (c) => ({ "&": "&amp;", "<": "&lt;", ">": "&gt;", '"': "&quot;", "'": "&#39;" }[c]));

  UI.el = (html) => {
    const t = document.createElement("template");
    t.innerHTML = html.trim();
    return t.content.firstElementChild;
  };

  // ---- formatting ----
  UI.money = (n, dec = 0) =>
    "$" + Number(n || 0).toLocaleString("en-US", { minimumFractionDigits: dec, maximumFractionDigits: dec });

  UI.date = (iso) => {
    if (!iso) return "—";
    const d = new Date(iso);
    return d.toLocaleDateString("en-US", { month: "short", day: "numeric", year: "numeric" });
  };
  UI.dateShort = (iso) => {
    if (!iso) return "—";
    return new Date(iso).toLocaleDateString("en-US", { month: "short", day: "numeric" });
  };
  UI.time = (iso) => {
    if (!iso) return "—";
    return new Date(iso).toLocaleTimeString("en-US", { hour: "numeric", minute: "2-digit" });
  };
  UI.ago = (iso) => {
    if (!iso) return "—";
    const s = Math.floor((Date.now() - new Date(iso)) / 1000);
    if (s < 60) return "just now";
    const m = Math.floor(s / 60); if (m < 60) return m + "m ago";
    const h = Math.floor(m / 60); if (h < 24) return h + "h ago";
    const d = Math.floor(h / 24); if (d < 30) return d + "d ago";
    const mo = Math.floor(d / 30); if (mo < 12) return mo + "mo ago";
    return Math.floor(mo / 12) + "y ago";
  };
  UI.until = (iso) => {
    if (!iso) return "—";
    const d = Math.ceil((new Date(iso) - Date.now()) / 864e5);
    if (d === 0) return "today";
    if (d < 0) return Math.abs(d) + "d ago";
    return "in " + d + "d";
  };
  UI.hours = (ms) => {
    const h = ms / 36e5;
    return h.toFixed(1) + "h";
  };
  UI.dur = (ms) => {
    const total = Math.max(0, Math.floor(ms / 1000));
    const h = String(Math.floor(total / 3600)).padStart(2, "0");
    const m = String(Math.floor((total % 3600) / 60)).padStart(2, "0");
    const s = String(total % 60).padStart(2, "0");
    return `${h}:${m}:${s}`;
  };
  UI.fileSize = (b) => {
    if (b < 1024) return b + " B";
    if (b < 1048576) return (b / 1024).toFixed(0) + " KB";
    return (b / 1048576).toFixed(1) + " MB";
  };
  UI.initials = (name) =>
    String(name || "?").trim().split(/\s+/).slice(0, 2).map((w) => w[0]).join("").toUpperCase();

  UI.cap = (s) => String(s || "").charAt(0).toUpperCase() + String(s || "").slice(1);

  UI.badge = (status) =>
    `<span class="badge b-${UI.esc(status)}">${UI.cap(status)}</span>`;

  // ---- toast ----
  UI.toast = (msg, type = "") => {
    const host = document.getElementById("toastHost");
    const t = UI.el(`<div class="toast ${type}">${type === "success" ? "✓ " : type === "error" ? "✕ " : ""}${UI.esc(msg)}</div>`);
    host.appendChild(t);
    setTimeout(() => { t.style.opacity = "0"; t.style.transform = "translateY(8px)"; t.style.transition = "all .25s"; }, 2600);
    setTimeout(() => t.remove(), 2900);
  };

  // ---- modal ----
  let onClose = null;
  UI.modal = ({ title, body, footer, onMount }) => {
    const host = document.getElementById("modalHost");
    const card = document.getElementById("modalCard");
    card.innerHTML = `
      <div class="m-head">
        <h3>${UI.esc(title)}</h3>
        <button class="icon-btn" data-modal-close style="margin-left:auto">✕</button>
      </div>
      <div class="m-body">${body}</div>
      ${footer ? `<div class="m-foot">${footer}</div>` : ""}`;
    host.classList.add("open");
    host.setAttribute("aria-hidden", "false");
    if (onMount) onMount(card);
    card.querySelectorAll("[data-modal-close]").forEach((b) => (b.onclick = UI.closeModal));
    document.getElementById("modalBackdrop").onclick = UI.closeModal;
  };
  UI.closeModal = () => {
    const host = document.getElementById("modalHost");
    host.classList.remove("open");
    host.setAttribute("aria-hidden", "true");
    document.getElementById("modalCard").innerHTML = "";
  };

  UI.confirm = (msg, onYes, { danger = true, yes = "Delete" } = {}) => {
    UI.modal({
      title: "Are you sure?",
      body: `<p class="muted">${UI.esc(msg)}</p>`,
      footer: `<button class="btn" data-modal-close>Cancel</button>
               <button class="btn ${danger ? "danger" : "primary"}" id="confirmYes">${UI.esc(yes)}</button>`,
      onMount: (card) => {
        card.querySelector("#confirmYes").onclick = () => { UI.closeModal(); onYes(); };
      },
    });
  };

  // Build a form from field defs, return values on submit
  UI.formModal = ({ title, fields, values = {}, submitLabel = "Save", onSubmit }) => {
    const fieldHtml = fields
      .map((f) => {
        const v = values[f.name] ?? f.value ?? "";
        if (f.type === "textarea")
          return `<div class="field"><label>${UI.esc(f.label)}</label><textarea name="${f.name}" placeholder="${UI.esc(f.placeholder || "")}">${UI.esc(v)}</textarea></div>`;
        if (f.type === "select")
          return `<div class="field"><label>${UI.esc(f.label)}</label><select name="${f.name}">${f.options
            .map((o) => `<option value="${UI.esc(o.value)}" ${String(v) === String(o.value) ? "selected" : ""}>${UI.esc(o.label)}</option>`)
            .join("")}</select></div>`;
        const t = f.type || "text";
        return `<div class="field"><label>${UI.esc(f.label)}</label><input type="${t}" name="${f.name}" placeholder="${UI.esc(f.placeholder || "")}" value="${UI.esc(v)}" ${f.required ? "required" : ""}/></div>`;
      });
    // group pairs marked with f.half into rows
    let body = "<form id='modalForm'>";
    for (let i = 0; i < fields.length; i++) {
      if (fields[i].half && fields[i + 1] && fields[i + 1].half) {
        body += `<div class="field-row">${fieldHtml[i]}${fieldHtml[i + 1]}</div>`;
        i++;
      } else body += fieldHtml[i];
    }
    body += "</form>";

    UI.modal({
      title,
      body,
      footer: `<button class="btn" data-modal-close>Cancel</button>
               <button class="btn primary" id="formSubmit">${UI.esc(submitLabel)}</button>`,
      onMount: (card) => {
        const form = card.querySelector("#modalForm");
        const submit = () => {
          const data = {};
          fields.forEach((f) => {
            const node = form.elements[f.name];
            data[f.name] = node ? node.value.trim() : "";
          });
          const missing = fields.find((f) => f.required && !data[f.name]);
          if (missing) { UI.toast("Please fill in " + missing.label, "error"); return; }
          UI.closeModal();
          onSubmit(data);
        };
        card.querySelector("#formSubmit").onclick = submit;
        form.onsubmit = (e) => { e.preventDefault(); submit(); };
        const first = form.querySelector("input,select,textarea");
        if (first) first.focus();
      },
    });
  };

  UI.empty = (icon, text, actionHtml = "") =>
    `<div class="empty"><div class="em-ico">${icon}</div><p>${UI.esc(text)}</p>${actionHtml}</div>`;

  window.UI = UI;

  // Global ESC to close modal
  document.addEventListener("keydown", (e) => {
    if (e.key === "Escape") UI.closeModal();
  });
})();

  /* =========================================================
     3. TIME TRACKER

  Views.timetracker = {
    title: "Time Tracker",
    render() {
      const d = S.get();
      const active = d.activeClock;
      const todayMs = d.timeEntries
        .filter((e) => new Date(e.clockIn).toDateString() === new Date().toDateString())
        .reduce((s, e) => s + (new Date(e.clockOut) - new Date(e.clockIn)), 0);
      const weekMs = d.timeEntries
        .filter((e) => Date.now() - new Date(e.clockIn) < 7 * 864e5)
        .reduce((s, e) => s + (new Date(e.clockOut) - new Date(e.clockIn)), 0);
      const earnings = (weekMs / 36e5) * (d.profile.hourlyRate || 0);

      return `
      <div class="page-head">
        <div class="ph-text"><h1>Time Tracker</h1><p>Clock in and out, and review your logged hours.</p></div>
      </div>

      <div class="grid cols-2">
        <div class="card card-pad" style="display:flex;flex-direction:column;align-items:center;gap:14px;text-align:center">
          <div class="clock-pill ${active ? "on" : ""}"><span class="dot"></span><span>${active ? "Clocked in" : "Clocked out"}</span></div>
          <div class="timer-display" id="liveTimer">${active ? U.dur(Date.now() - new Date(active.clockIn)) : "00:00:00"}</div>
          ${active ? `<div class="muted">Working on <strong>${U.esc(active.project)}</strong>${active.note ? " · " + U.esc(active.note) : ""}</div>
                      <div class="faint">Since ${U.time(active.clockIn)}</div>
                      <button class="btn danger" id="clockBtn" style="min-width:160px">⏹ Clock out</button>`
            : `<input class="search-input" id="ctProject" placeholder="What are you working on?" style="max-width:320px;text-align:center"/>
               <button class="btn primary" id="clockBtn" style="min-width:160px">▶ Clock in</button>`}
        </div>

        <div class="grid" style="grid-template-columns:1fr 1fr;align-content:start">
          ${stat({ label: "Today", value: U.hours(todayMs), icon: "📆", tone: "primary" })}
          ${stat({ label: "This week", value: U.hours(weekMs), icon: "📊", tone: "info" })}
          ${stat({ label: "Est. earnings (wk)", value: U.money(earnings), icon: "💵", tone: "success" })}
          ${stat({ label: "Entries", value: d.timeEntries.length, icon: "🧾", tone: "warn" })}
        </div>
      </div>

      <div class="card mt-24">
        <div class="card-head"><h3>Time entries</h3></div>
        <div class="table-wrap">
          <table class="tbl">
            <thead><tr><th>Project</th><th>Note</th><th>Date</th><th>Clock in</th><th>Clock out</th><th>Duration</th><th></th></tr></thead>
            <tbody>
              ${d.timeEntries.length ? d.timeEntries.map((e) => `
                <tr>
                  <td class="row-main">${U.esc(e.project)}</td>
                  <td class="muted">${U.esc(e.note || "—")}</td>
                  <td class="muted nowrap">${U.dateShort(e.clockIn)}</td>
                  <td class="muted">${U.time(e.clockIn)}</td>
                  <td class="muted">${U.time(e.clockOut)}</td>
                  <td class="row-main nowrap">${U.hours(new Date(e.clockOut) - new Date(e.clockIn))}</td>
                  <td><button class="btn sm ghost" data-act="del" data-id="${e.id}" style="color:var(--danger)">Delete</button></td>
                </tr>`).join("")
                : `<tr><td colspan="7">${U.empty("⏱", "No time logged yet. Clock in to get started.")}</td></tr>`}
            </tbody>
          </table>
        </div>
      </div>`;
    },
    mount(root) {
      const d = S.get();
      const btn = root.querySelector("#clockBtn");
      if (btn) btn.onclick = () => {
        if (d.activeClock) { S.clockOut(); U.toast("Clocked out", "success"); }
        else { const p = (root.querySelector("#ctProject")?.value || "").trim(); S.clockIn(p || "General"); U.toast("Clocked in", "success"); }
        window.App.rerender();
        window.App.refreshClockPill();
      };
      root.querySelectorAll('[data-act="del"]').forEach((b) => (b.onclick = () =>
        U.confirm("Delete this time entry?", () => { S.remove("timeEntries", b.dataset.id); U.toast("Deleted"); window.App.rerender(); })));

      // live timer
      const timer = root.querySelector("#liveTimer");
      if (timer && d.activeClock) {
        clearInterval(window.__ctTimer);
        window.__ctTimer = setInterval(() => {
          const a = S.get().activeClock;
          if (!a) { clearInterval(window.__ctTimer); return; }
          timer.textContent = U.dur(Date.now() - new Date(a.clockIn));
        }, 1000);
      }
    },
  };

  /* =========================================================
     4. INSIGHTS
  ========================================================= */
  Views.insights = {
    title: "Insights",
    render() {
      const d = S.get();
      const total = d.applications.length || 1;
      const counts = APP_STATUSES.reduce((m, s) => ((m[s] = d.applications.filter((a) => a.status === s).length), m), {});
      const offerRate = Math.round((counts.offer / total) * 100);
      const interviewRate = Math.round(((counts.interview + counts.offer) / total) * 100);

      // last 6 weeks of hours
      const weeks = [];
      for (let w = 5; w >= 0; w--) {
        const start = Date.now() - (w + 1) * 7 * 864e5;
        const end = Date.now() - w * 7 * 864e5;
        const ms = d.timeEntries
          .filter((e) => { const t = new Date(e.clockIn).getTime(); return t >= start && t < end; })
          .reduce((s, e) => s + (new Date(e.clockOut) - new Date(e.clockIn)), 0);
        weeks.push({ label: w === 0 ? "This wk" : w + "w ago", value: Math.round(ms / 36e5) });
      }

      const donut = [
        { label: "Applied", value: counts.applied, color: "var(--info)" },
        { label: "Interview", value: counts.interview, color: "var(--warn)" },
        { label: "Offer", value: counts.offer, color: "var(--success)" },
        { label: "Rejected", value: counts.rejected, color: "var(--danger)" },
      ];
      let acc = 0;
      const seg = donut.map((s) => { const start = acc / total * 360; acc += s.value; const end = acc / total * 360; return `${s.color} ${start}deg ${end}deg`; }).join(", ");

      // expense breakdown
      const expCats = {};
      d.transactions.filter((t) => t.type === "expense").forEach((t) => (expCats[t.category] = (expCats[t.category] || 0) + t.amount));
      const expData = Object.entries(expCats).map(([label, value]) => ({ label, value: Math.round(value) }));

      return `
      <div class="page-head"><div class="ph-text"><h1>Insights</h1><p>Analytics across your job search, time, and finances.</p></div></div>

      <div class="grid cols-4">
        ${stat({ label: "Offer rate", value: offerRate + "%", icon: "🎯", tone: "success" })}
        ${stat({ label: "Interview rate", value: interviewRate + "%", icon: "📈", tone: "primary" })}
        ${stat({ label: "Total applications", value: d.applications.length, icon: "💼", tone: "info" })}
        ${stat({ label: "Avg hrs / week", value: (weeks.reduce((s, w) => s + w.value, 0) / 6).toFixed(1), icon: "⏱", tone: "warn" })}
      </div>

      <div class="grid cols-2 mt-24">
        <div class="card">
          <div class="card-head"><h3>Hours logged — last 6 weeks</h3></div>
          <div class="card-pad">${barChart(weeks)}</div>
        </div>
        <div class="card">
          <div class="card-head"><h3>Application funnel</h3></div>
          <div class="card-pad flex gap-16 center" style="flex-wrap:wrap">
            <div style="width:150px;height:150px;border-radius:50%;background:conic-gradient(${seg});position:relative;flex-shrink:0">
              <div style="position:absolute;inset:24px;border-radius:50%;background:var(--surface);display:grid;place-items:center;text-align:center">
                <div><div style="font-size:22px;font-weight:800">${total}</div><div class="faint" style="font-size:11px">total</div></div>
              </div>
            </div>
            <div class="legend" style="flex:1;min-width:140px">
              ${donut.map((s) => `<div class="legend-item"><span class="legend-dot" style="background:${s.color}"></span>${s.label}<span style="margin-left:auto;font-weight:700">${s.value}</span></div>`).join("")}
            </div>
          </div>
        </div>
      </div>

      <div class="card mt-24">
        <div class="card-head"><h3>Expenses by category</h3></div>
        <div class="card-pad">${expData.length ? barChart(expData) : U.empty("💳", "No expenses recorded.")}</div>
      </div>`;
    },
    mount() {},
  };

  /* =========================================================
     7. SOPs (document hosting)
  ========================================================= */
  Views.sops = {
    title: "SOPs",
    render() {
      const d = S.get();
      return `
      <div class="page-head">
        <div class="ph-text"><h1>SOPs & Documents</h1><p>Upload, host, and version your standard operating procedures.</p></div>
        <div class="ph-actions"><button class="btn primary" id="uploadDoc">⬆ Upload document</button></div>
      </div>

      <div class="dropzone mt-8" id="dropzone">
        <div class="dz-ico">📁</div>
        <div><strong>Drag & drop files here</strong> or click to browse</div>
        <div class="faint" style="font-size:12px;margin-top:4px">PDF, DOCX, XLSX — stored locally in this workspace</div>
        <input type="file" id="fileInput" multiple style="display:none"/>
      </div>

      <div class="card mt-24">
        <div class="card-head"><h3>Document library</h3><div class="ch-actions"><span class="chip">${d.sops.length} files</span></div></div>
        <div class="table-wrap">
          <table class="tbl">
            <thead><tr><th>Document</th><th>Category</th><th>Version</th><th>Size</th><th>Uploaded by</th><th>Date</th><th></th></tr></thead>
            <tbody>
              ${d.sops.length ? d.sops.map((s) => `
                <tr>
                  <td><div class="flex gap-12 center"><div class="li-ico bg-info">${fileIcon(s.fileName)}</div>
                    <div><div class="row-main">${U.esc(s.title)}</div><div class="row-sub">${U.esc(s.fileName)}</div></div></div></td>
                  <td><span class="chip">${U.esc(s.category)}</span></td>
                  <td class="muted">${U.esc(s.version)}</td>
                  <td class="muted nowrap">${U.fileSize(s.size)}</td>
                  <td class="muted">${U.esc(s.uploadedBy)}</td>
                  <td class="muted nowrap">${U.dateShort(s.uploaded)}</td>
                  <td>${rowActions(s.id, true)}</td>
                </tr>`).join("")
                : `<tr><td colspan="7">${U.empty("📄", "No documents yet. Upload your first SOP.")}</td></tr>`}
            </tbody>
          </table>
        </div>
      </div>`;
    },
    mount(root) {
      const fileInput = root.querySelector("#fileInput");
      const dz = root.querySelector("#dropzone");
      const addFiles = (files) => {
        [...files].forEach((f) =>
          S.add("sops", {
            title: f.name.replace(/\.[^.]+$/, "").replace(/[-_]/g, " ").replace(/\b\w/g, (c) => c.toUpperCase()),
            category: "Uncategorized", version: "v1.0", fileName: f.name, size: f.size,
            uploadedBy: S.get().profile.name, uploaded: new Date().toISOString(),
          }));
        if (files.length) { U.toast(files.length + " file(s) uploaded", "success"); window.App.rerender(); }
      };
      dz.onclick = () => fileInput.click();
      fileInput.onchange = (e) => addFiles(e.target.files);
      dz.ondragover = (e) => { e.preventDefault(); dz.classList.add("drag"); };
      dz.ondragleave = () => dz.classList.remove("drag");
      dz.ondrop = (e) => { e.preventDefault(); dz.classList.remove("drag"); addFiles(e.dataTransfer.files); };

      root.querySelector("#uploadDoc").onclick = () => openDocForm(null);
      root.querySelectorAll('[data-act="edit"]').forEach((b) => (b.onclick = () => openDocForm(S.find("sops", b.dataset.id))));
      root.querySelectorAll('[data-act="del"]').forEach((b) => (b.onclick = () =>
        U.confirm("Delete this document?", () => { S.remove("sops", b.dataset.id); U.toast("Deleted"); window.App.rerender(); })));

      function openDocForm(doc) {
        U.formModal({
          title: doc ? "Edit document" : "Add document",
          submitLabel: doc ? "Save" : "Add",
          values: doc || {},
          fields: [
            { name: "title", label: "Title", required: true },
            { name: "category", label: "Category", type: "select", options: ["Operations", "HR", "Finance", "Marketing", "Legal", "Uncategorized"].map((c) => ({ value: c, label: c })), half: true },
            { name: "version", label: "Version", placeholder: "v1.0", half: true },
            { name: "fileName", label: "File name", placeholder: "document.pdf", required: true },
          ],
          onSubmit: (data) => {
            if (doc) { S.update("sops", doc.id, data); U.toast("Updated", "success"); }
            else { S.add("sops", { ...data, size: 102400, uploadedBy: S.get().profile.name, uploaded: new Date().toISOString() }); U.toast("Added", "success"); }
            window.App.rerender();
          },
        });
      }
    },
  };
  const fileIcon = (name = "") => {
    const e = name.split(".").pop().toLowerCase();
    if (["pdf"].includes(e)) return "📕";
    if (["doc", "docx"].includes(e)) return "📘";
    if (["xls", "xlsx", "csv"].includes(e)) return "📗";
    if (["png", "jpg", "jpeg", "gif"].includes(e)) return "🖼";
    return "📄";
  };

  /* =========================================================
     8. CONTRACTS
  ========================================================= */
  const CONTRACT_STATUSES = ["draft", "sent", "signed", "declined", "expired"];
  Views.contracts = {
    title: "Contracts",
    render() {
      const d = S.get();
      const totalValue = d.contracts.filter((c) => c.status === "signed").reduce((s, c) => s + c.value, 0);
      return `
      <div class="page-head">
        <div class="ph-text"><h1>Contracts</h1><p>Draft, send out, and track the status of agreements.</p></div>
        <div class="ph-actions"><button class="btn primary" id="addContract">＋ New contract</button></div>
      </div>

      <div class="grid cols-4">
        ${stat({ label: "Total contracts", value: d.contracts.length, icon: "📄", tone: "primary" })}
        ${stat({ label: "Awaiting signature", value: d.contracts.filter((c) => c.status === "sent").length, icon: "✍️", tone: "info" })}
        ${stat({ label: "Signed", value: d.contracts.filter((c) => c.status === "signed").length, icon: "✅", tone: "success" })}
        ${stat({ label: "Signed value", value: U.money(totalValue), icon: "💰", tone: "warn" })}
      </div>

      <div class="card mt-24">
        <div class="card-head"><h3>All contracts</h3></div>
        <div class="table-wrap">
          <table class="tbl">
            <thead><tr><th>Contract</th><th>Counterparty</th><th>Value</th><th>Status</th><th>Sent</th><th>Due</th><th></th></tr></thead>
            <tbody>
              ${d.contracts.length ? d.contracts.map((c) => `
                <tr>
                  <td class="row-main">${U.esc(c.title)}</td>
                  <td class="muted">${U.esc(c.party)}</td>
                  <td class="muted">${c.value ? U.money(c.value) : "—"}</td>
                  <td>${U.badge(c.status)}</td>
                  <td class="muted nowrap">${c.sent ? U.dateShort(c.sent) : "—"}</td>
                  <td class="muted nowrap">${U.dateShort(c.due)}</td>
                  <td>
                    <div class="flex gap-8 nowrap">
                      ${c.status === "draft" ? `<button class="btn sm" data-send="${c.id}">Send</button>` : ""}
                      <button class="btn sm ghost" data-act="edit" data-id="${c.id}">Edit</button>
                      <button class="btn sm ghost" data-act="del" data-id="${c.id}" style="color:var(--danger)">Delete</button>
                    </div>
                  </td>
                </tr>`).join("")
                : `<tr><td colspan="7">${U.empty("📄", "No contracts yet.")}</td></tr>`}
            </tbody>
          </table>
        </div>
      </div>`;
    },
    mount(root) {
      const open = (c) => {
        U.formModal({
          title: c ? "Edit contract" : "New contract",
          submitLabel: c ? "Save" : "Create",
          values: c || {},
          fields: [
            { name: "title", label: "Contract title", required: true },
            { name: "party", label: "Counterparty", required: true, half: true },
            { name: "value", label: "Value ($)", type: "number", half: true },
            { name: "status", label: "Status", type: "select", options: CONTRACT_STATUSES.map((s) => ({ value: s, label: U.cap(s) })), half: true },
            { name: "due", label: "Due date", type: "date", half: true },
          ],
          onSubmit: (data) => {
            data.value = Number(data.value) || 0;
            data.due = data.due ? new Date(data.due).toISOString() : new Date().toISOString();
            if (c) { S.update("contracts", c.id, data); U.toast("Updated", "success"); }
            else { S.add("contracts", { ...data, sent: data.status === "draft" ? null : new Date().toISOString() }); U.toast("Created", "success"); }
            window.App.rerender();
          },
        });
      };
      root.querySelector("#addContract").onclick = () => open(null);
      root.querySelectorAll("[data-send]").forEach((b) => (b.onclick = () => {
        S.update("contracts", b.dataset.send, { status: "sent", sent: new Date().toISOString() });
        U.toast("Contract sent ✉️", "success"); window.App.rerender();
      }));
      root.querySelectorAll('[data-act="edit"]').forEach((b) => (b.onclick = () => open(S.find("contracts", b.dataset.id))));
      root.querySelectorAll('[data-act="del"]').forEach((b) => (b.onclick = () =>
        U.confirm("Delete this contract?", () => { S.remove("contracts", b.dataset.id); U.toast("Deleted"); window.App.rerender(); })));
    },
  };

  /* =========================================================
     9. PAYROLL & EXPENSES
  ========================================================= */
  let txFilter = "all";
  Views.payroll = {
    title: "Payroll & Expenses",
    render() {
      const d = S.get();
      const payroll = d.transactions.filter((t) => t.type === "payroll").reduce((s, t) => s + t.amount, 0);
      const expenses = d.transactions.filter((t) => t.type === "expense").reduce((s, t) => s + t.amount, 0);
      const pending = d.transactions.filter((t) => t.status === "pending").reduce((s, t) => s + t.amount, 0);
      const list = txFilter === "all" ? d.transactions : d.transactions.filter((t) => t.type === txFilter);

      return `
      <div class="page-head">
        <div class="ph-text"><h1>Payroll & Expenses</h1><p>Run payroll and track every expense in one place.</p></div>
        <div class="ph-actions"><button class="btn primary" id="addTx">＋ Add transaction</button></div>
      </div>

      <div class="grid cols-3">
        ${stat({ label: "Payroll (total)", value: U.money(payroll), icon: "👛", tone: "primary" })}
        ${stat({ label: "Expenses (total)", value: U.money(expenses), icon: "🧾", tone: "info" })}
        ${stat({ label: "Pending approval", value: U.money(pending), icon: "⏳", tone: "warn" })}
      </div>

      <div class="card mt-24">
        <div class="card-head">
          <div class="flex gap-8">
            ${["all", "payroll", "expense"].map((t) => `<button class="chip" data-txf="${t}" style="${txFilter === t ? "background:var(--primary);color:#fff;border-color:var(--primary)" : ""}">${t === "all" ? "All" : U.cap(t)}</button>`).join("")}
          </div>
        </div>
        <div class="table-wrap">
          <table class="tbl">
            <thead><tr><th>Description</th><th>Type</th><th>Category</th><th>Amount</th><th>Status</th><th>Date</th><th></th></tr></thead>
            <tbody>
              ${list.length ? list.map((t) => `
                <tr>
                  <td class="row-main">${U.esc(t.desc)}</td>
                  <td><span class="chip">${U.cap(t.type)}</span></td>
                  <td class="muted">${U.esc(t.category)}</td>
                  <td class="row-main nowrap">${U.money(t.amount)}</td>
                  <td>${U.badge(t.status)}</td>
                  <td class="muted nowrap">${U.dateShort(t.date)}</td>
                  <td>
                    <div class="flex gap-8 nowrap">
                      ${t.status === "pending" ? `<button class="btn sm" data-approve="${t.id}">Approve</button>` : ""}
                      <button class="btn sm ghost" data-act="del" data-id="${t.id}" style="color:var(--danger)">Delete</button>
                    </div>
                  </td>
                </tr>`).join("")
                : `<tr><td colspan="7">${U.empty("💳", "No transactions yet.")}</td></tr>`}
            </tbody>
          </table>
        </div>
      </div>`;
    },
    mount(root) {
      root.querySelectorAll("[data-txf]").forEach((b) => (b.onclick = () => { txFilter = b.dataset.txf; window.App.rerender(); }));
      root.querySelector("#addTx").onclick = () => {
        U.formModal({
          title: "Add transaction",
          submitLabel: "Add",
          fields: [
            { name: "desc", label: "Description", required: true },
            { name: "type", label: "Type", type: "select", options: [{ value: "expense", label: "Expense" }, { value: "payroll", label: "Payroll" }], half: true },
            { name: "amount", label: "Amount ($)", type: "number", required: true, half: true },
            { name: "category", label: "Category", placeholder: "Software, Travel…", half: true },
            { name: "status", label: "Status", type: "select", options: ["pending", "approved", "paid"].map((s) => ({ value: s, label: U.cap(s) })), half: true },
          ],
          onSubmit: (data) => {
            S.add("transactions", { ...data, amount: Number(data.amount) || 0, category: data.category || "General", date: new Date().toISOString() });
            U.toast("Transaction added", "success"); window.App.rerender();
          },
        });
      };
      root.querySelectorAll("[data-approve]").forEach((b) => (b.onclick = () => {
        S.update("transactions", b.dataset.approve, { status: "approved" }); U.toast("Approved", "success"); window.App.rerender();
      }));
      root.querySelectorAll('[data-act="del"]').forEach((b) => (b.onclick = () =>
        U.confirm("Delete this transaction?", () => { S.remove("transactions", b.dataset.id); U.toast("Deleted"); window.App.rerender(); })));
    },
  };

  /* =========================================================
     10. APPLICANTS (hiring pipeline)
  ========================================================= */
  const STAGES = ["review", "screening", "interview", "offer", "hired", "rejected"];
  Views.applicants = {
    title: "Applicants",
    render() {
      const d = S.get();
      const byStage = STAGES.reduce((m, s) => ((m[s] = d.applicants.filter((a) => a.stage === s)), m), {});
      return `
      <div class="page-head">
        <div class="ph-text"><h1>Applicants</h1><p>Track candidates through your hiring pipeline.</p></div>
        <div class="ph-actions"><button class="btn primary" id="addApplicant">＋ Add applicant</button></div>
      </div>

      <div class="grid cols-4">
        ${stat({ label: "Total applicants", value: d.applicants.length, icon: "🧑‍💼", tone: "primary" })}
        ${stat({ label: "In interview", value: byStage.interview.length, icon: "🗣", tone: "warn" })}
        ${stat({ label: "Offers out", value: byStage.offer.length, icon: "🤝", tone: "info" })}
        ${stat({ label: "Hired", value: byStage.hired.length, icon: "🎉", tone: "success" })}
      </div>

      <div class="card mt-24">
        <div class="card-head"><h3>Candidate pipeline</h3></div>
        <div class="table-wrap">
          <table class="tbl">
            <thead><tr><th>Candidate</th><th>Role</th><th>Stage</th><th>Rating</th><th>Applied</th><th></th></tr></thead>
            <tbody>
              ${d.applicants.length ? d.applicants.map((a) => `
                <tr>
                  <td><div class="flex gap-12 center"><div class="avatar" style="width:32px;height:32px;font-size:12px">${U.initials(a.name)}</div>
                    <div><div class="row-main">${U.esc(a.name)}</div><div class="row-sub">${U.esc(a.email)}</div></div></div></td>
                  <td class="muted">${U.esc(a.role)}</td>
                  <td>
                    <select class="badge b-${a.stage}" data-stage="${a.id}" style="border:none;cursor:pointer;padding:4px 8px;border-radius:30px;font-weight:600">
                      ${STAGES.map((s) => `<option value="${s}" ${a.stage === s ? "selected" : ""}>${U.cap(s)}</option>`).join("")}
                    </select>
                  </td>
                  <td style="color:var(--warn)">${"★".repeat(a.rating)}<span class="faint">${"★".repeat(5 - a.rating)}</span></td>
                  <td class="muted nowrap">${U.ago(a.applied)}</td>
                  <td><button class="btn sm ghost" data-act="del" data-id="${a.id}" style="color:var(--danger)">Delete</button></td>
                </tr>`).join("")
                : `<tr><td colspan="6">${U.empty("🧑‍💼", "No applicants yet.")}</td></tr>`}
            </tbody>
          </table>
        </div>
      </div>`;
    },
    mount(root) {
      root.querySelector("#addApplicant").onclick = () => {
        U.formModal({
          title: "Add applicant",
          submitLabel: "Add",
          fields: [
            { name: "name", label: "Full name", required: true, half: true },
            { name: "email", label: "Email", type: "email", half: true },
            { name: "role", label: "Role applying for", required: true, half: true },
            { name: "stage", label: "Stage", type: "select", options: STAGES.map((s) => ({ value: s, label: U.cap(s) })), half: true },
            { name: "rating", label: "Rating (1–5)", type: "number", value: 3 },
          ],
          onSubmit: (data) => {
            S.add("applicants", { ...data, rating: Math.max(1, Math.min(5, Number(data.rating) || 3)), applied: new Date().toISOString() });
            U.toast("Applicant added", "success"); window.App.rerender();
          },
        });
      };
      root.querySelectorAll("[data-stage]").forEach((sel) => (sel.onchange = () => {
        S.update("applicants", sel.dataset.stage, { stage: sel.value }); U.toast("Stage updated", "success"); window.App.rerender();
      }));
      root.querySelectorAll('[data-act="del"]').forEach((b) => (b.onclick = () =>
        U.confirm("Remove this applicant?", () => { S.remove("applicants", b.dataset.id); U.toast("Removed"); window.App.rerender(); })));
    },
  };

  /* =========================================================
     11. TEAM
  ========================================================= */
  Views.team = {
    title: "Team",
    render() {
      const d = S.get();
      const depts = [...new Set(d.team.map((t) => t.dept))];
      return `
      <div class="page-head">
        <div class="ph-text"><h1>Team</h1><p>Your people, departments, and contact info.</p></div>
        <div class="ph-actions"><button class="btn primary" id="addMember">＋ Add member</button></div>
      </div>

      <div class="grid cols-4">
        ${stat({ label: "Team size", value: d.team.length, icon: "👥", tone: "primary" })}
        ${stat({ label: "Departments", value: depts.length, icon: "🏢", tone: "info" })}
        ${stat({ label: "Active", value: d.team.filter((t) => t.status === "active").length, icon: "🟢", tone: "success" })}
        ${stat({ label: "Away", value: d.team.filter((t) => t.status === "away").length, icon: "🌙", tone: "warn" })}
      </div>

      <div class="grid cols-3 mt-24">
        ${d.team.map((m) => `
          <div class="card card-pad">
            <div class="flex between center">
              <div class="flex gap-12 center">
                <div class="avatar" style="width:46px;height:46px;font-size:16px">${U.initials(m.name)}</div>
                <div><div class="row-main">${U.esc(m.name)}</div><div class="row-sub">${U.esc(m.title)}</div></div>
              </div>
              <span class="badge b-${m.status === "active" ? "active" : "pending"}">${U.cap(m.status)}</span>
            </div>
            <div class="flex gap-8 mt-16" style="flex-wrap:wrap">
              <span class="chip">🏢 ${U.esc(m.dept)}</span>
              <span class="chip">✉️ ${U.esc(m.email)}</span>
            </div>
            <div class="flex between center mt-16">
              <span class="faint" style="font-size:12px">Joined ${U.date(m.joined)}</span>
              <div class="flex gap-8">
                <button class="btn sm ghost" data-act="edit" data-id="${m.id}">Edit</button>
                <button class="btn sm ghost" data-act="del" data-id="${m.id}" style="color:var(--danger)">Remove</button>
              </div>
            </div>
          </div>`).join("")}
      </div>`;
    },
    mount(root) {
      const open = (m) => {
        U.formModal({
          title: m ? "Edit member" : "Add team member",
          submitLabel: m ? "Save" : "Add",
          values: m || {},
          fields: [
            { name: "name", label: "Full name", required: true, half: true },
            { name: "title", label: "Title", half: true },
            { name: "dept", label: "Department", type: "select", options: ["Operations", "Finance", "Marketing", "Design", "Engineering", "Sales", "Support"].map((c) => ({ value: c, label: c })), half: true },
            { name: "status", label: "Status", type: "select", options: [{ value: "active", label: "Active" }, { value: "away", label: "Away" }], half: true },
            { name: "email", label: "Email", type: "email" },
          ],
          onSubmit: (data) => {
            if (m) { S.update("team", m.id, data); U.toast("Updated", "success"); }
            else { S.add("team", { ...data, joined: new Date().toISOString() }); U.toast("Member added", "success"); }
            window.App.rerender();
          },
        });
      };
      root.querySelector("#addMember").onclick = () => open(null);
      root.querySelectorAll('[data-act="edit"]').forEach((b) => (b.onclick = () => open(S.find("team", b.dataset.id))));
      root.querySelectorAll('[data-act="del"]').forEach((b) => (b.onclick = () =>
        U.confirm("Remove this team member?", () => { S.remove("team", b.dataset.id); U.toast("Removed"); window.App.rerender(); })));
    },
  };

  window.Views = Views;
})();

/* ============================================================
   App — router, navigation, chrome
   ============================================================ */
(function () {
  const S = window.Store;
  const U = window.UI;

  const NAV = [
    { group: "Personal", items: [
      { id: "dashboard", label: "My Dashboard", icon: "🏠" },
      { id: "applications", label: "Job Applications", icon: "💼", badge: () => S.get().applications.filter((a) => a.status === "interview").length || "" },
      { id: "timetracker", label: "Time Tracker", icon: "⏱", badge: () => (S.get().activeClock ? "●" : "") },
      { id: "insights", label: "Insights", icon: "📈" },
      { id: "jobsearch", label: "Job Search", icon: "🔍", badge: () => S.get().jobMarket.filter((j) => new Date(j.posted).toDateString() === new Date().toDateString()).length || "" },
      { id: "account", label: "My Account", icon: "👤" },
    ]},
    { group: "Workspace", items: [
      { id: "sops", label: "SOPs", icon: "📄", badge: () => S.get().sops.length },
      { id: "contracts", label: "Contracts", icon: "✍️", badge: () => S.get().contracts.filter((c) => c.status === "sent").length || "" },
      { id: "payroll", label: "Payroll & Expenses", icon: "💳", badge: () => S.get().transactions.filter((t) => t.status === "pending").length || "" },
      { id: "applicants", label: "Applicants", icon: "🧑‍💼", badge: () => S.get().applicants.filter((a) => !["hired", "rejected"].includes(a.stage)).length || "" },
      { id: "team", label: "Team", icon: "👥", badge: () => S.get().team.length },
    ]},
  ];

  let current = location.hash.replace("#", "") || "dashboard";

  const App = {
    go(route) {
      if (!window.Views[route]) route = "dashboard";
      current = route;
      location.hash = route;
      this.render();
      if (window.innerWidth <= 900) this.closeSidebar();
      document.querySelector(".content").scrollTo?.(0, 0);
      window.scrollTo(0, 0);
    },
    rerender() { this.render(); },
    render() {
      const view = window.Views[current] || window.Views.dashboard;
      document.getElementById("pageTitle").textContent = view.title;
      const content = document.getElementById("content");
      content.innerHTML = view.render();
      view.mount?.(content);
      this.renderNav();
    },
    renderNav() {
      const nav = document.getElementById("nav");
      nav.innerHTML = NAV.map((g) => `
        <div class="nav-group">
          <div class="nav-group-label">${g.group}</div>
          ${g.items.map((it) => {
            const badge = it.badge ? it.badge() : "";
            return `<button class="nav-item ${current === it.id ? "active" : ""}" data-route="${it.id}">
              <span class="ni-icon">${it.icon}</span><span>${it.label}</span>
              ${badge !== "" && badge !== 0 ? `<span class="ni-badge">${badge}</span>` : ""}
            </button>`;
          }).join("")}
        </div>`).join("");
      nav.querySelectorAll("[data-route]").forEach((b) => (b.onclick = () => this.go(b.dataset.route)));
    },
    refreshSidebarUser() {
      const p = S.get().profile;
      document.getElementById("sidebarAvatar").textContent = U.initials(p.name);
      document.getElementById("sidebarName").textContent = p.name;
      document.getElementById("sidebarRole").textContent = p.role || "Member";
    },
    refreshClockPill() {
      const a = S.get().activeClock;
      const pill = document.getElementById("clockPill");
      const text = document.getElementById("clockPillText");
      pill.classList.toggle("on", !!a);
      text.textContent = a ? "Clocked in" : "Clocked out";
      clearInterval(window.__pillTimer);
      if (a) {
        const upd = () => { const ac = S.get().activeClock; if (!ac) { clearInterval(window.__pillTimer); App.refreshClockPill(); return; } text.textContent = "On the clock · " + U.dur(Date.now() - new Date(ac.clockIn)); };
        upd();
        window.__pillTimer = setInterval(upd, 1000);
      }
      this.renderNav();
    },
    openSidebar() { document.getElementById("sidebar").classList.add("open"); document.getElementById("scrim").classList.add("show"); },
    closeSidebar() { document.getElementById("sidebar").classList.remove("open"); document.getElementById("scrim").classList.remove("show"); },
  };

  window.App = App;

  // ---- init ----
  function init() {
    // theme
    const savedTheme = localStorage.getItem("wd_theme");
    if (savedTheme) document.documentElement.setAttribute("data-theme", savedTheme);
    document.getElementById("themeToggle").onclick = () => {
      const cur = document.documentElement.getAttribute("data-theme") === "dark" ? "light" : "dark";
      document.documentElement.setAttribute("data-theme", cur);
      localStorage.setItem("wd_theme", cur);
    };

    // clock pill click → time tracker
    document.getElementById("clockPill").onclick = () => App.go("timetracker");

    // mobile menu
    document.getElementById("menuToggle").onclick = () => {
      const open = document.getElementById("sidebar").classList.contains("open");
      open ? App.closeSidebar() : App.openSidebar();
    };
    document.getElementById("scrim").onclick = () => App.closeSidebar();

    // sidebar user chip → account
    document.querySelector(".user-chip").onclick = () => App.go("account");

    window.addEventListener("hashchange", () => {
      const r = location.hash.replace("#", "");
      if (r && r !== current) App.go(r);
    });

    App.refreshSidebarUser();
    App.refreshClockPill();
    App.go(current);
  }

  if (document.readyState === "loading") document.addEventListener("DOMContentLoaded", init);
  else init();
})();

  </script>
</body>
</html>
